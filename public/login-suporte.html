<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Atendente | Gateway DATASUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background: #0b1120; font-family: 'Inter', sans-serif; }
        .glass { 
            background: rgba(30, 41, 59, 0.5); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .btn-premium {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); }
        .floating-circles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .circle { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="floating-circles">
        <div class="circle w-96 h-96 -top-20 -left-20"></div>
        <div class="circle w-[500px] h-[500px] -bottom-40 -right-20"></div>
    </div>

    <div class="glass w-full max-w-md p-10 rounded-[2.5rem] animate-in fade-in zoom-in duration-500">
        <div class="text-center mb-10">
            <div class="bg-blue-600/10 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-blue-500/20 shadow-2xl">
                <i class="fa-solid fa-user-tie text-blue-500 text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-white italic tracking-tighter uppercase mb-2">Login <span class="text-blue-500">Atendente</span></h1>
            <p class="text-slate-400 text-sm font-medium tracking-wide">Área exclusiva para equipe de suporte</p>
        </div>

        <div class="space-y-6">
            <div class="space-y-2">
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 ml-1">E-mail de Acesso</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                        <i class="fa-solid fa-envelope text-sm"></i>
                    </span>
                    <input type="email" id="email" 
                        class="w-full bg-slate-900/40 border border-white/5 p-4 pl-12 rounded-2xl text-white outline-none transition-all placeholder:text-slate-700 text-sm" 
                        placeholder="nome@empresa.com">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 ml-1">Senha</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                        <i class="fa-solid fa-lock text-sm"></i>
                    </span>
                    <input type="password" id="senha" 
                        class="w-full bg-slate-900/40 border border-white/5 p-4 pl-12 rounded-2xl text-white outline-none transition-all placeholder:text-slate-700 text-sm" 
                        placeholder="••••••••">
                </div>
            </div>

            <button onclick="loginSupport()" id="btn-login" class="btn-premium w-full text-white font-black py-5 rounded-2xl shadow-xl active:scale-[0.98] uppercase text-xs tracking-[0.1em] mt-4">
                Entrar no Sistema
            </button>

            <div class="pt-6 text-center border-t border-white/5">
                <a href="admin-login.html" class="text-[10px] font-black text-slate-600 uppercase tracking-widest hover:text-blue-500 transition-colors">
                    Acesso Admin Master <i class="fa-solid fa-chevron-right ml-1"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        async function loginSupport() {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const btn = document.getElementById('btn-login');

            if (!email || !senha) return alert("Por favor, preencha todos os campos.");

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> AUTENTICANDO...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const data = await res.json();

                if (res.ok) {
                    if (data.role !== 'support') {
                        alert("⚠️ Acesso permitido apenas para Atendentes.");
                        btn.disabled = false;
                        btn.innerText = "Entrar no Sistema";
                        return;
                    }

                    // Define as variáveis de sessão para o admin.html reconhecer
                    sessionStorage.setItem('admin_autenticado', 'true');
                    sessionStorage.setItem('admin_role', 'support');
                    sessionStorage.setItem('admin_nome', data.user);
                    sessionStorage.setItem('admin_email', data.email);
                    
                    window.location.href = 'admin.html';
                } else {
                    alert(data.error || "E-mail ou senha incorretos.");
                    btn.disabled = false;
                    btn.innerText = "Entrar no Sistema";
                }
            } catch (err) {
                alert("Erro ao conectar com o servidor.");
                btn.disabled = false;
                btn.innerText = "Entrar no Sistema";
            }
        }

        // Atalho Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginSupport();
        });
    </script>
</body>
</html>
