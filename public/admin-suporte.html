<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Suporte Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        #admin-chat-box::-webkit-scrollbar { width: 6px; }
        #admin-chat-box::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .message-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .chat-img-admin {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: zoom-in;
            display: block;
        }
        .user-item.active {
            background-color: #1e293b;
            border-left-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 overflow-hidden">

    <div class="flex h-screen">
        <div class="w-1/3 border-r border-slate-700 p-4 flex flex-col">
            <h2 class="font-bold text-xl mb-6 text-white flex items-center gap-2">
                <i class="fa-solid fa-headset text-blue-500"></i> Atendimentos
            </h2>
            
            <div id="user-list" class="space-y-2 overflow-y-auto flex-1">
                <div id="no-chats" class="text-center p-10 text-slate-500 text-xs italic">
                    Nenhum usuário ativo no momento...
                </div>
            </div>

            <div class="mt-4 pt-4 border-t border-slate-700 text-[10px] text-slate-500 font-mono">
                GATEWAY DATASUS v1.0 | ADMIN
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-slate-900/50">
            <div class="p-4 border-b border-slate-700 bg-[#0f172a]/80 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <span class="text-sm font-bold uppercase tracking-widest text-blue-400">Conversa: <span id="chat-title">Nenhum</span></span>
                    <span id="status-badge" class="text-[10px] bg-slate-500/20 text-slate-400 px-2 py-1 rounded border border-slate-500/30 font-bold">AGUARDANDO</span>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="testarSom()" class="text-slate-500 hover:text-blue-400 transition-colors text-xs flex items-center gap-1">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                    <button onclick="limparTela()" class="text-slate-500 hover:text-red-400 transition-colors flex items-center gap-2 text-xs font-bold uppercase tracking-tighter">
                        <i class="fa-solid fa-trash-can"></i> Limpar Tela
                    </button>
                </div>
            </div>

            <div id="admin-chat-box" class="flex-1 p-6 overflow-y-auto flex flex-col gap-4">
                <div id="empty-state" class="self-center bg-slate-800/50 text-slate-500 text-[10px] px-4 py-1 rounded-full border border-white/5">
                    Selecione um atendimento à esquerda para iniciar
                </div>
            </div>

            <div class="p-4 bg-slate-800 border-t border-slate-700 flex gap-4 shadow-2xl items-center">
                <label for="admin-file" class="cursor-pointer text-slate-400 hover:text-blue-500 transition-colors px-2">
                    <i class="fa-solid fa-paperclip text-xl"></i>
                    <input type="file" id="admin-file" class="hidden" accept="image/*, .pdf, .docx, .txt" onchange="adminEnviarArquivo()">
                </label>

                <input type="text" id="admin-input" 
                    class="flex-1 bg-slate-900 border border-slate-700 p-3 rounded-xl text-white outline-none focus:border-blue-500 transition-all" 
                    placeholder="Escreva sua resposta...">
                
                <button onclick="enviarResposta()" 
                    class="bg-blue-600 hover:bg-blue-500 px-8 py-2 rounded-xl font-bold text-white transition-all active:scale-95 flex items-center gap-2">
                    <span>Enviar</span>
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>
    </div>

    <audio id="notificacao-som" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        const socket = io();
        const nomeAdmin = "Suporte Arpoador"; // Nome que aparece para o usuário
        const somNotificacao = document.getElementById('notificacao-som');
        
        let salaAtiva = ""; // Email do usuário que estamos atendendo no momento
        let usuariosAtivos = {}; // Armazena info dos usuários que mandaram msg

        // Ao conectar, avisa que é admin para receber notificações globais
        socket.on('connect', () => {
            console.log("Admin conectado.");
            socket.emit('admin_entrar'); 
        });

        // Recebe mensagens e gerencia a lista à esquerda
        socket.on('receber_mensagem', (data) => {
            const { usuario, texto, salaId } = data;
            
            // Adiciona/Atualiza usuário na lista lateral
            if (usuario !== nomeAdmin) {
                if (!usuariosAtivos[salaId]) {
                    document.getElementById('no-chats').style.display = 'none';
                    usuariosAtivos[salaId] = { nome: usuario, ultimaMsg: texto };
                    criarCardUsuario(salaId, usuario, texto);
                } else {
                    atualizarCardUsuario(salaId, texto);
                }

                // Notificações
                if (salaId !== salaAtiva) {
                    tocarSom();
                    marcarComoNaoLida(salaId);
                }
            }

            // Se a mensagem for da sala que estou olhando, renderiza na tela
            if (salaId === salaAtiva) {
                renderizarMensagem(data);
            }
        });

        // Recebe o histórico ao trocar de sala
        socket.on('historico_mensagens', (mensagens) => {
            const chatBox = document.getElementById('admin-chat-box');
            chatBox.innerHTML = "";
            mensagens.forEach(data => renderizarMensagem(data, false));
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        function selecionarUsuario(salaId, nome) {
            salaAtiva = salaId;
            document.getElementById('chat-title').innerText = nome;
            document.getElementById('status-badge').innerText = "ATENDENDO";
            document.getElementById('status-badge').className = "text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded border border-green-500/30 font-bold";
            document.getElementById('empty-state').style.display = 'none';
            
            // Highlight na lista
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`user-${salaId.replace(/[^a-zA-Z0-9]/g, '')}`).classList.add('active');
            document.getElementById(`unread-${salaId.replace(/[^a-zA-Z0-9]/g, '')}`).classList.add('hidden');

            // Pede o histórico dessa sala específica
            socket.emit('entrar_na_sala', salaId);
        }

        function criarCardUsuario(salaId, nome, texto) {
            const safeId = salaId.replace(/[^a-zA-Z0-9]/g, '');
            const userList = document.getElementById('user-list');
            const card = document.createElement('div');
            card.id = `user-${safeId}`;
            card.className = "user-item p-3 bg-slate-800/40 rounded-xl border-l-4 border-transparent cursor-pointer hover:bg-slate-800 transition-all relative";
            card.onclick = () => selecionarUsuario(salaId, nome);
            
            card.innerHTML = `
                <div id="unread-${safeId}" class="absolute top-2 right-2 w-2 h-2 bg-blue-500 rounded-full"></div>
                <p class="font-bold text-sm text-white">${nome}</p>
                <p id="preview-${safeId}" class="text-xs text-slate-400 truncate">${texto}</p>
            `;
            userList.prepend(card);
        }

        function atualizarCardUsuario(salaId, texto) {
            const safeId = salaId.replace(/[^a-zA-Z0-9]/g, '');
            const preview = document.getElementById(`preview-${safeId}`);
            if (preview) preview.innerText = texto;
        }

        function marcarComoNaoLida(salaId) {
            const safeId = salaId.replace(/[^a-zA-Z0-9]/g, '');
            const dot = document.getElementById(`unread-${safeId}`);
            if (dot) dot.classList.remove('hidden');
        }

        function renderizarMensagem(data, scroll = true) {
            const chatBox = document.getElementById('admin-chat-box');
            const msgDiv = document.createElement('div');
            const souEu = data.usuario === nomeAdmin;

            msgDiv.className = `message-fade-in ${souEu ? 
                "self-end bg-blue-600/20 border border-blue-500/30 p-4 rounded-2xl rounded-tr-none max-w-[70%] text-right shadow-sm" : 
                "self-start bg-slate-800 border border-white/5 p-4 rounded-2xl rounded-tl-none max-w-[70%] shadow-sm"}`;
            
            msgDiv.innerHTML = `
                <p class="text-[10px] font-bold text-blue-400 mb-1 uppercase tracking-tighter">${souEu ? 'Você (Suporte)' : data.usuario}</p>
                <div class="text-sm ${souEu ? 'text-slate-100' : 'text-slate-200'}">${data.texto}</div>
            `;

            chatBox.appendChild(msgDiv);
            if (scroll) chatBox.scrollTop = chatBox.scrollHeight;
        }

        function enviarResposta() {
            const input = document.getElementById('admin-input');
            const mensagem = input.value.trim();
            if (!mensagem || !salaAtiva) return;

            socket.emit('enviar_mensagem', {
                nome: nomeAdmin,
                mensagem: mensagem,
                salaId: salaAtiva // Fundamental: envia para a sala do usuário selecionado
            });

            input.value = "";
            input.focus();
        }

        function adminEnviarArquivo() {
            const fileInput = document.getElementById('admin-file');
            const file = fileInput.files[0];
            if (!file || !salaAtiva) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                let htmlContent = file.type.startsWith('image/') 
                    ? `<img src="${e.target.result}" class="chat-img-admin" onclick="window.open(this.src)" />`
                    : `<a href="${e.target.result}" download="${file.name}" class="text-blue-400 underline italic">📄 ${file.name}</a>`;

                socket.emit('enviar_mensagem', {
                    nome: nomeAdmin,
                    mensagem: htmlContent,
                    salaId: salaAtiva
                });
            };
            reader.readAsDataURL(file);
            fileInput.value = "";
        }

        function tocarSom() {
            somNotificacao.currentTime = 0;
            somNotificacao.play().catch(() => {});
        }

        function testarSom() {
            tocarSom();
        }

        function limparTela() {
            document.getElementById('admin-chat-box').innerHTML = "";
        }

        document.getElementById('admin-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviarResposta();
        });
    </script>
</body>
</html>
