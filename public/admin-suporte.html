<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Suporte Gateway</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        #admin-chat-box::-webkit-scrollbar { width: 6px; }
        #admin-chat-box::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        .message-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .chat-img-admin {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: zoom-in;
            display: block;
        }
        .user-item.active {
            background-color: rgba(30, 41, 59, 0.8);
            border-left: 4px solid #3b82f6;
        }
        .unread-dot {
            width: 8px;
            height: 8px;
            background-color: #3b82f6;
            border-radius: 50%;
            box-shadow: 0 0 8px #3b82f6;
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 overflow-hidden">

    <div class="flex h-screen">
        <div class="w-1/3 border-r border-slate-700 p-4 flex flex-col bg-[#0f172a]">
            <h2 class="font-bold text-xl mb-6 text-white flex items-center gap-2">
                <i class="fa-solid fa-headset text-blue-500"></i> Atendimentos
            </h2>
            
            <div id="user-list" class="space-y-2 overflow-y-auto flex-1 pr-2">
                <div id="no-chats" class="text-center p-10 text-slate-500 text-xs italic">
                    Nenhum usuário ativo no momento...
                </div>
            </div>

            <div class="mt-4 pt-4 border-t border-slate-700 text-[10px] text-slate-500 font-mono flex justify-between items-center">
                <span>GATEWAY SUS v1.0</span>
                <span class="flex items-center gap-1 text-green-500">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> ONLINE
                </span>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-slate-900/30">
            <div class="p-4 border-b border-slate-700 bg-[#0f172a]/80 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Chat Ativo</span>
                        <span id="chat-title" class="text-sm font-bold text-blue-400">Nenhum selecionado</span>
                    </div>
                    <span id="status-badge" class="hidden text-[10px] bg-slate-500/20 text-slate-400 px-2 py-1 rounded border border-slate-500/30 font-bold uppercase">Aguardando</span>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="encerrarAtendimento()" class="bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white border border-red-600/20 px-3 py-1.5 rounded text-[10px] font-bold uppercase flex items-center gap-1 transition-all">
                        <i class="fa-solid fa-circle-xmark"></i> Finalizar Chamado
                    </button>

                    <div class="h-4 w-[1px] bg-slate-700 mx-1"></div>
                    
                    <button onclick="limparTela()" title="Limpar mensagens da tela" class="text-slate-500 hover:text-red-400 transition-colors">
                        <i class="fa-solid fa-eraser"></i>
                    </button>
                    <button onclick="testarSom()" title="Testar Som" class="text-slate-500 hover:text-blue-400 transition-colors">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                </div>
            </div>

            <div id="admin-chat-box" class="flex-1 p-6 overflow-y-auto flex flex-col gap-4">
                <div id="empty-state" class="self-center mt-20 text-center">
                    <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 border border-white/5">
                        <i class="fa-solid fa-message text-slate-600 text-xl"></i>
                    </div>
                    <p class="text-slate-500 text-xs italic">Selecione um atendimento à esquerda para visualizar</p>
                </div>
            </div>

            <div class="p-4 bg-[#0f172a] border-t border-slate-700 flex gap-4 shadow-2xl items-center">
                <button type="button" onclick="document.getElementById('admin-file').click()" class="text-slate-400 hover:text-blue-500 transition-colors px-2">
                    <i class="fa-solid fa-paperclip text-xl"></i>
                </button>
                <input type="file" id="admin-file" class="hidden" onchange="adminEnviarArquivo()">

                <input type="text" id="admin-input" 
                    class="flex-1 bg-slate-900 border border-slate-800 p-3 rounded-xl text-white outline-none focus:border-blue-500 transition-all placeholder:text-slate-600" 
                    placeholder="Digite sua resposta para o usuário...">
                
                <button id="btnEnviar" onclick="enviarResposta()" 
                    class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-xl font-bold text-white transition-all active:scale-95 flex items-center gap-2">
                    <span>ENVIAR</span>
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>
    </div>

    <audio id="notificacao-som" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        const socket = io();
        const nomeAdmin = "Suporte Arpoador"; 
        const somNotificacao = document.getElementById('notificacao-som');
        
        let salaAtiva = ""; 
        let usuariosAtivos = {}; 

        // Função para limpar caracteres especiais de IDs do DOM
        const formatId = (id) => id.replace(/[^a-zA-Z0-9]/g, '_');

        socket.on('connect', () => {
            console.log("✔️ Admin online no Socket.");
            socket.emit('admin_entrar'); 
        });

        socket.on('receber_mensagem', (data) => {
            const { usuario, texto, salaId, arquivo } = data;
            
            if (usuario !== nomeAdmin) {
                const previewText = arquivo ? "📎 [Arquivo/Imagem]" : texto;
                
                if (!usuariosAtivos[salaId]) {
                    document.getElementById('no-chats').style.display = 'none';
                    usuariosAtivos[salaId] = { nome: usuario, ultimaMsg: previewText };
                    criarCardUsuario(salaId, usuario, previewText);
                } else {
                    atualizarCardUsuario(salaId, previewText);
                }

                if (salaId !== salaAtiva) {
                    tocarSom();
                    const dot = document.getElementById(`unread-${formatId(salaId)}`);
                    if (dot) dot.classList.remove('hidden');
                }
            }

            if (salaId === salaAtiva) {
                renderizarMensagem(data);
            }
        });

        socket.on('historico_mensagens', (mensagens) => {
            const chatBox = document.getElementById('admin-chat-box');
            chatBox.innerHTML = "";
            mensagens.forEach(data => renderizarMensagem(data, false));
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        socket.on('chamado_encerrado', (data) => {
            const safeId = formatId(data.salaId);
            const card = document.getElementById(`user-${safeId}`);
            
            if (data.salaId === salaAtiva) {
                limparTela();
                document.getElementById('chat-title').innerText = "Encerrado";
                const badge = document.getElementById('status-badge');
                badge.innerText = "SESSÃO FINALIZADA";
                badge.className = "text-[10px] bg-red-500/20 text-red-400 px-2 py-1 rounded border border-red-500/30 font-bold uppercase";
                salaAtiva = "";
            }

            if (card) card.remove();
            delete usuariosAtivos[data.salaId];

            if (Object.keys(usuariosAtivos).length === 0) {
                document.getElementById('no-chats').style.display = 'block';
            }
        });

        function selecionarUsuario(salaId, nome) {
            salaAtiva = salaId;
            document.getElementById('chat-title').innerText = nome;
            const badge = document.getElementById('status-badge');
            badge.classList.remove('hidden');
            badge.innerText = "Atendimento em curso";
            badge.className = "text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded border border-green-500/30 font-bold uppercase";
            
            document.getElementById('empty-state').style.display = 'none';
            
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
            const safeId = formatId(salaId);
            const card = document.getElementById(`user-${safeId}`);
            if(card) card.classList.add('active');
            
            const dot = document.getElementById(`unread-${safeId}`);
            if(dot) dot.classList.add('hidden');

            socket.emit('entrar_na_sala', salaId);
        }

        function encerrarAtendimento() {
            if (!salaAtiva) return;
            if (confirm(`Finalizar permanentemente o atendimento de ${usuariosAtivos[salaAtiva].nome}?`)) {
                socket.emit('encerrar_chamado', salaAtiva);
            }
        }

        function criarCardUsuario(salaId, nome, texto) {
            const safeId = formatId(salaId);
            const userList = document.getElementById('user-list');
            const card = document.createElement('div');
            card.id = `user-${safeId}`;
            card.className = "user-item p-4 bg-slate-800/20 rounded-xl border-l-4 border-transparent cursor-pointer hover:bg-slate-800/40 transition-all relative mb-2";
            card.onclick = () => selecionarUsuario(salaId, nome);
            
            card.innerHTML = `
                <div id="unread-${safeId}" class="absolute top-4 right-4 unread-dot"></div>
                <div class="flex flex-col">
                    <span class="font-bold text-sm text-white">${nome}</span>
                    <span id="preview-${safeId}" class="text-[11px] text-slate-500 truncate mt-1 italic">${texto}</span>
                </div>
            `;
            userList.prepend(card);
        }

        function atualizarCardUsuario(salaId, texto) {
            const preview = document.getElementById(`preview-${formatId(salaId)}`);
            if (preview) preview.innerText = texto;
        }

        function renderizarMensagem(data, scroll = true) {
            const chatBox = document.getElementById('admin-chat-box');
            const msgDiv = document.createElement('div');
            const souEu = data.usuario === nomeAdmin;

            msgDiv.className = `message-fade-in flex flex-col ${souEu ? 'items-end' : 'items-start'}`;
            
            const bubbleClass = souEu ? 
                "bg-blue-600/20 border border-blue-500/30 text-right rounded-2xl rounded-tr-none" : 
                "bg-slate-800 border border-white/5 text-left rounded-2xl rounded-tl-none";

            let conteudoHTML = `
                <span class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter mb-1 px-1">
                    ${souEu ? 'Você' : data.usuario}
                </span>
                <div class="p-4 max-w-[80%] shadow-sm ${bubbleClass}">
            `;
            
            const arquivo = data.arquivo || data.file;
            const tipo = data.tipo || data.tipo_arquivo;

            if (arquivo) {
                if (tipo && tipo.startsWith('image/')) {
                    conteudoHTML += `<img src="${arquivo}" class="chat-img-admin" onclick="window.open(this.src)" />`;
                } else {
                    conteudoHTML += `<div class="mt-2"><a href="${arquivo}" download="suporte_anexo" class="inline-flex items-center gap-2 bg-slate-900 hover:bg-black p-3 rounded-lg text-xs text-blue-400 transition-all">
                        <i class="fa-solid fa-file-arrow-down"></i> Baixar Documento
                    </a></div>`;
                }
            } 
            
            if (data.texto && data.texto.trim() !== "" && !data.texto.startsWith("Enviou um arquivo:")) {
                conteudoHTML += `<p class="text-sm leading-relaxed">${data.texto}</p>`;
            }

            conteudoHTML += `</div>`;
            msgDiv.innerHTML = conteudoHTML;
            chatBox.appendChild(msgDiv);
            if (scroll) chatBox.scrollTop = chatBox.scrollHeight;
        }

        function enviarResposta() {
            const input = document.getElementById('admin-input');
            const mensagem = input.value.trim();
            if (!mensagem || !salaAtiva) return;

            socket.emit('enviar_mensagem', {
                nome: nomeAdmin,
                mensagem: mensagem,
                salaId: salaAtiva
            });

            input.value = "";
            input.focus();
        }

        function adminEnviarArquivo() {
            const fileInput = document.getElementById('admin-file');
            const file = fileInput.files[0];
            if (!file || !salaAtiva) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                socket.emit('enviar_mensagem', {
                    nome: nomeAdmin,
                    arquivo: e.target.result,
                    tipo_arquivo: file.type,
                    salaId: salaAtiva
                });
            };
            reader.readAsDataURL(file);
            fileInput.value = ""; 
        }

        function tocarSom() {
            somNotificacao.currentTime = 0;
            somNotificacao.play().catch(() => {});
        }

        function testarSom() { tocarSom(); }
        function limparTela() { document.getElementById('admin-chat-box').innerHTML = ""; }

        document.getElementById('admin-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviarResposta();
        });
    </script>
</body>
</html>
