<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Suporte Gateway</title>
    
    <script>
        if (sessionStorage.getItem('admin_autenticado') !== 'true') {
            window.location.href = 'admin-login.html';
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        #admin-chat-box::-webkit-scrollbar { width: 6px; }
        #admin-chat-box::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        .message-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .chat-img-admin {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: zoom-in;
            display: block;
            transition: transform 0.2s;
        }
        .chat-img-admin:hover { transform: scale(1.02); }

        .user-item.active {
            background-color: rgba(59, 130, 246, 0.1);
            border-left: 4px solid #3b82f6;
        }
        .unread-dot {
            width: 10px;
            height: 10px;
            background-color: #3b82f6;
            border-radius: 50%;
            box-shadow: 0 0 10px #3b82f6;
        }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 overflow-hidden font-sans">

    <div class="flex h-screen">
        <div class="w-1/3 border-r border-slate-800 p-4 flex flex-col bg-[#0f172a]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-lg text-white flex items-center gap-2">
                    <i class="fa-solid fa-headset text-blue-500"></i> Atendimentos
                </h2>
                <div class="flex gap-2">
                    <button onclick="abrirModalSuporte()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-2 rounded-lg transition-all flex items-center gap-2 text-xs font-bold" title="Adicionar Suporte">
                        <i class="fa-solid fa-user-plus"></i>
                        <span>Adicionar Atendente</span>
                    </button>
                    <button onclick="sessionStorage.clear(); window.location.reload();" class="text-slate-500 hover:text-white text-xs uppercase font-bold transition-colors">Sair</button>
                </div>
            </div>
            
            <div id="user-list" class="space-y-2 overflow-y-auto flex-1 pr-2">
                <div id="no-chats" class="text-center py-20 text-slate-600">
                    <i class="fa-solid fa-ghost text-3xl mb-3 block opacity-20"></i>
                    <p class="text-xs italic">Aguardando novos chamados...</p>
                </div>
            </div>

            <div class="mt-4 pt-4 border-t border-slate-800 text-[10px] text-slate-500 font-mono flex justify-between items-center">
                <span>GATEWAY SUS v1.1</span>
                <span class="flex items-center gap-1 text-green-500">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> SERVER ONLINE
                </span>
            </div>
        </div>

        <div class="flex-1 flex flex-col bg-slate-900/20">
            <div class="p-4 border-b border-slate-800 bg-[#0f172a]/80 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="flex flex-col">
                        <span class="text-[9px] text-slate-500 uppercase font-black tracking-[0.2em]">Interagindo com</span>
                        <span id="chat-title" class="text-sm font-bold text-blue-400">Selecione um usuário</span>
                    </div>
                    <span id="status-badge" class="hidden text-[10px] px-2 py-0.5 rounded border font-bold uppercase"></span>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="encerrarAtendimento()" class="bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white border border-red-600/20 px-4 py-2 rounded-lg text-[10px] font-bold uppercase flex items-center gap-2 transition-all">
                        <i class="fa-solid fa-check-double"></i> Finalizar Chamado
                    </button>
                    <div class="h-6 w-[1px] bg-slate-800 mx-1"></div>
                    <button onclick="limparTela()" title="Limpar Tela" class="text-slate-500 hover:text-white transition-colors">
                        <i class="fa-solid fa-eraser"></i>
                    </button>
                </div>
            </div>

            <div id="admin-chat-box" class="flex-1 p-6 overflow-y-auto flex flex-col gap-4">
                <div id="empty-state" class="m-auto text-center opacity-30">
                    <i class="fa-solid fa-comments text-6xl mb-4 block"></i>
                    <p class="text-sm">Clique em um atendimento para iniciar</p>
                </div>
            </div>

            <div class="p-4 bg-[#0f172a] border-t border-slate-800 flex gap-4 shadow-2xl items-center">
                <button type="button" onclick="document.getElementById('admin-file').click()" class="text-slate-500 hover:text-blue-500 transition-colors p-2">
                    <i class="fa-solid fa-paperclip text-xl"></i>
                </button>
                <input type="file" id="admin-file" class="hidden" onchange="adminEnviarArquivo()">

                <input type="text" id="admin-input" 
                    class="flex-1 bg-slate-900 border border-slate-800 p-3.5 rounded-xl text-white outline-none focus:border-blue-500 transition-all placeholder:text-slate-600 text-sm" 
                    placeholder="Escreva sua mensagem aqui...">
                
                <button id="btnEnviar" onclick="enviarResposta()" 
                    class="bg-blue-600 hover:bg-blue-500 px-6 py-3.5 rounded-xl font-bold text-white transition-all active:scale-95 flex items-center gap-2">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
    
    <!-- Modal Adicionar Suporte -->
    <div id="modal-suporte" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
        <div class="bg-[#0f172a] border border-slate-800 w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-fade-in">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <h3 class="font-bold text-white flex items-center gap-2">
                    <i class="fa-solid fa-user-shield text-blue-500"></i> Novo Suporte
                </h3>
                <button onclick="fecharModalSuporte()" class="text-slate-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-[10px] uppercase font-black text-slate-500 mb-1">Nome Completo</label>
                    <input type="text" id="sup-nome" class="w-full bg-slate-900 border border-slate-800 p-3 rounded-xl text-white outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-[10px] uppercase font-black text-slate-500 mb-1">E-mail de Acesso</label>
                    <input type="email" id="sup-email" class="w-full bg-slate-900 border border-slate-800 p-3 rounded-xl text-white outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-[10px] uppercase font-black text-slate-500 mb-1">Senha Temporária</label>
                    <input type="password" id="sup-senha" class="w-full bg-slate-900 border border-slate-800 p-3 rounded-xl text-white outline-none focus:border-blue-500">
                </div>
                <button onclick="criarContaSuporte()" id="btn-criar-sup" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all mt-4">
                    Cadastrar Atendente
                </button>
            </div>
        </div>
    </div>

    <audio id="notificacao-som" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        const socket = io();
        const nomeAdmin = "Suporte Arpoador"; 
        const somNotificacao = document.getElementById('notificacao-som');
        
        let salaAtiva = ""; 
        let usuariosAtivos = {}; 
        const mensagensProcessadas = new Set();

        const formatId = (id) => id ? id.toString().replace(/[^a-zA-Z0-9]/g, '_') : 'unknown';

        socket.on('connect', () => {
            socket.emit('admin_entrar'); 
        });

        socket.on('erro_chat', (data) => {
            alert(data.mensagem);
            if (salaAtiva) {
                const safeId = formatId(salaAtiva);
                document.getElementById(`user-${safeId}`)?.classList.remove('active');
                salaAtiva = "";
                document.getElementById('chat-title').innerText = "Selecione um usuário";
                document.getElementById('status-badge').classList.add('hidden');
                document.getElementById('empty-state').style.display = 'flex';
            }
        });

        socket.on('usuario_ocupado', (data) => {
            const safeId = formatId(data.salaId);
            const card = document.getElementById(`user-${safeId}`);
            if (card && data.atendente !== socket.id) {
                card.style.opacity = "0.5";
                const preview = document.getElementById(`preview-${safeId}`);
                if (preview) preview.innerText = "🔒 Sendo atendido por outro...";
            }
        });

        socket.on('usuario_livre', (data) => {
            const safeId = formatId(data.salaId);
            const card = document.getElementById(`user-${safeId}`);
            if (card) {
                card.style.opacity = "1";
                const preview = document.getElementById(`preview-${safeId}`);
                if (preview) preview.innerText = "Disponível";
            }
        });

        socket.on('receber_mensagem', (data) => {
            const autor = data.usuario || data.nome || "Usuário";
            const texto = data.texto || data.mensagem || "";
            const salaId = data.salaId;
            const isMe = (autor === nomeAdmin);

            if (!isMe) {
                const previewText = (data.arquivo || data.tipo_arquivo) ? "📎 [Anexo]" : texto;
                
                if (!usuariosAtivos[salaId]) {
                    const noChats = document.getElementById('no-chats');
                    if (noChats) noChats.style.display = 'none';
                    usuariosAtivos[salaId] = { nome: autor };
                    criarCardUsuario(salaId, autor, previewText);
                } else {
                    atualizarCardUsuario(salaId, previewText);
                }

                if (salaId !== salaAtiva) {
                    tocarSom();
                    const dot = document.getElementById(`unread-${formatId(salaId)}`);
                    if (dot) dot.classList.remove('hidden');
                }
            }

            if (salaId === salaAtiva) {
                renderizarMensagem(data);
            }
        });

        socket.on('historico_mensagens', (mensagens) => {
            const chatBox = document.getElementById('admin-chat-box');
            chatBox.innerHTML = "";
            mensagensProcessadas.clear();
            mensagens.forEach(data => renderizarMensagem(data, false));
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        socket.on('chamado_encerrado', (data) => {
            const safeId = formatId(data.salaId);
            const card = document.getElementById(`user-${safeId}`);
            
            if (data.salaId === salaAtiva) {
                document.getElementById('chat-title').innerText = "Sessão Encerrada";
                const badge = document.getElementById('status-badge');
                badge.innerText = "Finalizado";
                badge.className = "text-[10px] bg-red-500/10 text-red-500 px-2 py-0.5 rounded border border-red-500/20 font-bold uppercase";
                salaAtiva = "";
            }

            if (card) card.remove();
            delete usuariosAtivos[data.salaId];
            
            if (Object.keys(usuariosAtivos).length === 0) {
                document.getElementById('no-chats').style.display = 'block';
            }
        });

        function selecionarUsuario(salaId, nome) {
            salaAtiva = salaId;
            mensagensProcessadas.clear();
            
            document.getElementById('chat-title').innerText = nome;
            const badge = document.getElementById('status-badge');
            badge.classList.remove('hidden');
            badge.innerText = "Em Atendimento";
            badge.className = "text-[10px] bg-green-500/10 text-green-500 px-2 py-0.5 rounded border border-green-500/20 font-bold uppercase";
            
            const emptyState = document.getElementById('empty-state');
            if (emptyState) emptyState.style.display = 'none';
            
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
            
            const safeId = formatId(salaId);
            const card = document.getElementById(`user-${safeId}`);
            if(card) card.classList.add('active');
            
            const dot = document.getElementById(`unread-${safeId}`);
            if(dot) dot.classList.add('hidden');

            socket.emit('entrar_na_sala', salaId);
        }

        function encerrarAtendimento() {
            if (!salaAtiva) return;
            if (confirm(`Confirmar encerramento do atendimento?`)) {
                socket.emit('encerrar_chamado', salaAtiva);
            }
        }

        function criarCardUsuario(salaId, nome, texto) {
            const safeId = formatId(salaId);
            const userList = document.getElementById('user-list');
            if (document.getElementById(`user-${safeId}`)) return;

            const card = document.createElement('div');
            card.id = `user-${safeId}`;
            card.className = "user-item p-4 bg-slate-800/10 rounded-xl border-l-4 border-transparent cursor-pointer hover:bg-slate-800/30 transition-all relative mb-2";
            card.onclick = () => selecionarUsuario(salaId, nome);
            
            card.innerHTML = `
                <div id="unread-${safeId}" class="absolute top-4 right-4 unread-dot"></div>
                <div class="flex flex-col">
                    <span class="font-bold text-sm text-white">${nome}</span>
                    <span id="preview-${safeId}" class="text-[11px] text-slate-500 truncate mt-1 italic">${texto}</span>
                </div>
            `;
            userList.prepend(card);
        }

        function atualizarCardUsuario(salaId, texto) {
            const preview = document.getElementById(`preview-${formatId(salaId)}`);
            if (preview) preview.innerText = texto;
        }

        function renderizarMensagem(data, scroll = true) {
            const autor = data.usuario || data.nome || "Usuário";
            const texto = data.texto || data.mensagem || "";
            const arquivo = data.arquivo || data.file;
            const tipo = data.tipo || data.tipo_arquivo;
            
            const msgId = data.id || `${autor}-${texto}-${arquivo ? 'file' : 'text'}-${data.timestamp}`;
            if (mensagensProcessadas.has(msgId)) return;
            mensagensProcessadas.add(msgId);

            const chatBox = document.getElementById('admin-chat-box');
            const msgDiv = document.createElement('div');
            const souEu = (autor === nomeAdmin);

            msgDiv.className = `message-fade-in flex flex-col mb-4 ${souEu ? 'items-end' : 'items-start'}`;
            
            const bubbleClass = souEu ? 
                "bg-blue-600/10 border border-blue-500/20 text-white rounded-2xl rounded-tr-none" : 
                "bg-slate-800 border border-white/5 text-slate-200 rounded-2xl rounded-tl-none";

            let corpoHTML = texto ? `<p class="text-sm leading-relaxed">${texto}</p>` : '';
            
            if (arquivo) {
                if (tipo && tipo.startsWith('image/')) {
                    corpoHTML += `<img src="${arquivo}" class="chat-img-admin" onclick="window.open(this.src)" />`;
                } else {
                    corpoHTML += `<div class="mt-2"><a href="${arquivo}" download="arquivo" class="inline-flex items-center gap-2 bg-slate-900 hover:bg-black p-3 rounded-lg text-xs text-blue-400 transition-colors">
                        <i class="fa-solid fa-file-arrow-down"></i> Baixar Anexo
                    </a></div>`;
                }
            }

            msgDiv.innerHTML = `
                <span class="text-[9px] font-bold text-slate-600 uppercase mb-1.5 px-1">${souEu ? 'Você' : autor}</span>
                <div class="p-4 max-w-[85%] shadow-sm ${bubbleClass}">${corpoHTML}</div>
            `;
            
            chatBox.appendChild(msgDiv);
            if (scroll) chatBox.scrollTop = chatBox.scrollHeight;
        }

        function enviarResposta() {
            const input = document.getElementById('admin-input');
            const mensagem = input.value.trim();
            if (!mensagem || !salaAtiva) return;

            socket.emit('enviar_mensagem', {
                nome: nomeAdmin,
                mensagem: mensagem,
                salaId: salaAtiva
            });

            input.value = "";
            input.focus();
        }

        function adminEnviarArquivo() {
            const fileInput = document.getElementById('admin-file');
            const file = fileInput.files[0];
            if (!file || !salaAtiva) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                socket.emit('enviar_mensagem', {
                    nome: nomeAdmin,
                    arquivo: e.target.result,
                    tipo_arquivo: file.type,
                    salaId: salaAtiva
                });
            };
            reader.readAsDataURL(file);
            fileInput.value = ""; 
        }

        function tocarSom() {
            somNotificacao.currentTime = 0;
            somNotificacao.play().catch(() => {});
        }

        function limparTela() { 
            document.getElementById('admin-chat-box').innerHTML = ""; 
            mensagensProcessadas.clear();
        }

        function abrirModalSuporte() { document.getElementById('modal-suporte').classList.remove('hidden'); }
        function fecharModalSuporte() { document.getElementById('modal-suporte').classList.add('hidden'); }

        async function criarContaSuporte() {
            const nome = document.getElementById('sup-nome').value;
            const email = document.getElementById('sup-email').value;
            const senha = document.getElementById('sup-senha').value;
            const btn = document.getElementById('btn-criar-sup');

            if (!nome || !email || !senha) return alert("Preencha todos os campos");

            btn.disabled = true;
            btn.innerText = "Criando...";

            try {
                const res = await fetch('/api/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha, role: 'support' })
                });
                const data = await res.json();
                if (res.ok) {
                    alert("Suporte cadastrado com sucesso!");
                    fecharModalSuporte();
                    document.getElementById('sup-nome').value = '';
                    document.getElementById('sup-email').value = '';
                    document.getElementById('sup-senha').value = '';
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("Erro ao conectar com servidor");
            } finally {
                btn.disabled = false;
                btn.innerText = "Cadastrar Atendente";
            }
        }

        document.getElementById('admin-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviarResposta();
        });
    </script>
</body>
</html>
