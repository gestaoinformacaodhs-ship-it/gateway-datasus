<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIOPS | Gateway SUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-200 h-screen flex flex-col overflow-hidden">

    <div class="p-4 bg-[#111827] border-b border-slate-800 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='/dashboard.html'" class="text-slate-400 hover:text-white transition-colors">
                <i class="fa-solid fa-house text-xl"></i>
            </button>
            <div>
                <h1 class="text-white font-bold text-lg leading-none">SIOPS</h1>
                <p class="text-[10px] text-blue-400 uppercase font-black tracking-widest mt-1">Portal de Orçamentos Públicos</p>
            </div>
        </div>
        <div class="flex gap-3">
            <a href="https://siops.datasus.gov.br/" target="_blank" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-4 py-2 rounded-lg transition-all shadow-lg shadow-blue-900/20">
                <i class="fa-solid fa-external-link"></i>
                ABRIR PORTAL OFICIAL
            </a>
        </div>
    </div>

    <div class="flex-1 flex items-center justify-center p-6 relative">
        <div class="absolute w-64 h-64 bg-blue-600/10 rounded-full blur-3xl"></div>

        <div class="glass-card max-w-md w-full p-8 rounded-2xl text-center relative z-10">
            <div class="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-shield-halved text-blue-400 text-3xl"></i>
            </div>
            
            <h2 class="text-xl font-bold text-white mb-3">Segurança de Navegação</h2>
            
            <p class="text-slate-400 text-sm mb-8 leading-relaxed">
                Para proteger seus dados e garantir o acesso total às ferramentas de orçamento, o portal <span class="text-blue-400 font-medium">SIOPS</span> deve ser visualizado em uma janela dedicada fora do dashboard.
            </p>

            <div class="space-y-4">
                <a href="https://siops.datasus.gov.br/" target="_blank" rel="noopener noreferrer" 
                   class="block w-full py-4 bg-white text-slate-900 font-bold rounded-xl hover:bg-slate-200 transition-all transform active:scale-95 shadow-xl">
                    ACESSAR SIOPS AGORA
                </a>
                
                <button onclick="window.location.href='/dashboard.html'" 
                   class="block w-full py-3 border border-slate-700 text-slate-400 text-sm font-medium rounded-xl hover:bg-slate-800 transition-all">
                    Voltar ao Início
                </button>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-800">
                <p class="text-[10px] text-slate-500 uppercase tracking-tighter">
                    Conexão Segura via DATASUS Gov BR
                </p>
            </div>
        </div>
    </div>

</body>
</html>
