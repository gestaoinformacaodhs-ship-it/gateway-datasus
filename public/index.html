<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | Gateway DATASUS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                        url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .glass-card {
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }
        input:focus {
            outline: none;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.4);
        }
        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 42px;
            cursor: pointer;
            color: #64748b;
            transition: 0.2s;
        }
        .toggle-btn:hover { color: #3b82f6; }

        #user-chat-box::-webkit-scrollbar { width: 4px; }
        #user-chat-box::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
    <script>
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-sans text-slate-200">

    <div id="login-container" class="glass-card w-full max-w-[400px] p-8 rounded-3xl bg-slate-800/40">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black tracking-tighter text-white">GATEWAY <span class="text-blue-500">SUS</span></h2>
            <p class="text-slate-400 text-sm mt-1 font-medium uppercase tracking-widest">Gestão de Informação DHS</p>
        </div>
        
        <div class="space-y-5">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">E-mail de Acesso</label>
                <input type="email" id="l-email" class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-white transition-all" placeholder="nome@exemplo.com">
            </div>
            
            <div class="relative">
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">Sua Senha</label>
                <input type="password" id="l-pass" class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-white transition-all" placeholder="••••••••">
                <span class="toggle-btn" onclick="toggleView('l-pass', this)"><i class="fa-solid fa-eye"></i></span>
            </div>
            
            <button id="btn-entrar" onclick="entrar()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-600/20">
                Entrar no Sistema
            </button>
        </div>
        
        <div class="mt-8 flex justify-between items-center text-xs font-bold uppercase tracking-tighter">
            <a href="javascript:void(0)" onclick="trocar('forgot')" class="text-slate-400 hover:text-blue-400 transition-colors">Esqueci a senha</a>
            <a href="javascript:void(0)" onclick="trocar('signup')" class="text-blue-500 hover:text-blue-400 transition-colors underline underline-offset-4">Criar Conta</a>
        </div>
    </div>

    <div id="signup-container" class="glass-card w-full max-w-[400px] p-8 rounded-3xl bg-slate-800/40 hidden">
        <div class="text-center mb-6">
            <h3 class="text-xl font-bold text-white">Nova Conta</h3>
            <p class="text-slate-400 text-sm">Preencha os dados para acesso.</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">Nome Completo</label>
                <input type="text" id="r-nome" class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-white transition-all">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">E-mail</label>
                <input type="email" id="r-email" class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-white transition-all">
            </div>
            <div class="relative">
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">Senha</label>
                <input type="password" id="r-pass" class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-white transition-all">
                <span class="toggle-btn" onclick="toggleView('r-pass', this)"><i class="fa-solid fa-eye"></i></span>
            </div>
            <button id="btn-registrar" onclick="registrar()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all active:scale-95 mt-2">
                Finalizar Cadastro
            </button>
            <button onclick="trocar('login')" class="w-full text-slate-400 text-xs font-bold uppercase py-2 hover:text-white transition-colors">
                ← Voltar ao Login
            </button>
        </div>
    </div>

    <div id="forgot-container" class="glass-card w-full max-w-[400px] p-8 rounded-3xl bg-slate-800/40 hidden text-center">
        <i class="fa-solid fa-lock-open text-blue-500 text-4xl mb-4"></i>
        <h3 class="text-xl font-bold text-white mb-2">Recuperar Senha</h3>
        <p class="text-slate-400 text-sm mb-6">Enviaremos um link de redefinição para o seu e-mail.</p>

        <div class="space-y-4">
            <div class="text-left">
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">E-mail Cadastrado</label>
                <input type="email" id="f-email" class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-white transition-all" placeholder="seu@email.com">
            </div>
            <button id="btn-forgot" onclick="solicitarRecuperacao()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-600/20">
                Enviar Instruções
            </button>
            <button onclick="trocar('login')" class="w-full text-slate-400 text-xs font-bold uppercase py-2 hover:text-white transition-colors">
                ← Voltar ao Login
            </button>
        </div>
    </div>

    <div id="chat-container" class="fixed bottom-6 right-6 z-50">
        <button onclick="toggleChat()" id="chat-button" class="bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-full shadow-2xl transition-all active:scale-95 flex items-center justify-center relative">
            <i class="fa-solid fa-comments text-2xl"></i>
            <span id="badge-notificacao" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full border-2 border-[#0f172a]">!</span>
        </button>

        <div id="chat-window" class="hidden glass-card bg-slate-900/95 w-80 h-[400px] rounded-2xl flex flex-col overflow-hidden mb-4 border border-white/10">
            <div class="bg-blue-600 p-4 text-white flex justify-between items-center shadow-lg">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                    <span class="font-bold text-xs uppercase tracking-widest">Suporte Online</span>
                </div>
                <button onclick="toggleChat()" class="hover:text-slate-200"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div id="user-chat-box" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3 text-xs"></div>

            <div class="p-3 bg-slate-900 border-t border-white/5 flex gap-2">
                <input type="text" id="user-input" placeholder="Sua mensagem..." 
                    class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-xs outline-none focus:border-blue-500">
                <button onclick="enviarMensagemUsuario()" class="bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-500 transition-all">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <audio id="user-notificacao-som" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        const socket = io();
        const somUser = document.getElementById('user-notificacao-som');
        const chatWindow = document.getElementById('chat-window');
        const badge = document.getElementById('badge-notificacao');
        
        let emailSala = "";

        function atualizarSala() {
            const inputEmail = document.getElementById('l-email').value.trim().toLowerCase();
            const emailSalvo = localStorage.getItem('email');
            
            // Prioriza e-mail logado, depois e-mail digitado, depois ID do socket
            let novaSala = emailSalvo || (inputEmail.includes('@') ? inputEmail : "visitante_" + socket.id);
            
            if (novaSala !== emailSala) {
                emailSala = novaSala;
                socket.emit('entrar_na_sala', emailSala);
            }
        }

        socket.on('connect', atualizarSala);
        document.getElementById('l-email').addEventListener('blur', atualizarSala);

        // Atalho Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('login-container').style.display !== 'none') entrar();
                else if (!chatWindow.classList.contains('hidden')) enviarMensagemUsuario();
            }
        });

        function toggleView(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            input.type = input.type === "password" ? "text" : "password";
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        }

        function trocar(tela) {
            ['login-container', 'signup-container', 'forgot-container'].forEach(c => document.getElementById(c).style.display = 'none');
            document.getElementById(tela + '-container').style.display = 'block';
        }

        function toggleChat() {
            chatWindow.classList.toggle('hidden');
            badge.classList.add('hidden');
            if (!chatWindow.classList.contains('hidden')) atualizarSala();
        }

        // --- API CALLS ---
        async function entrar() {
            const email = document.getElementById('l-email').value;
            const senha = document.getElementById('l-pass').value;
            const btn = document.getElementById('btn-entrar');
            if (!email || !senha) return alert("Preencha todos os campos.");
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Entrando...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                const data = await res.json();
                
                if (res.ok) {
                    // Armazena dados e redireciona
                    localStorage.setItem('usuario', data.user);
                    localStorage.setItem('email', data.email);
                    localStorage.setItem('token', 'sessao_ativa'); // Garante que o script de topo funcione
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || "Erro ao fazer login.");
                }
            } catch (err) {
                alert("Erro de conexão com o servidor.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Entrar no Sistema";
            }
        }

        async function registrar() {
            const nome = document.getElementById('r-nome').value;
            const email = document.getElementById('r-email').value;
            const senha = document.getElementById('r-pass').value;
            const btn = document.getElementById('btn-registrar');
            
            if (!nome || !email || !senha) return alert("Preencha todos os campos.");
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha })
                });
                const data = await res.json();
                if (res.ok) {
                    alert("Cadastro realizado! Verifique seu e-mail para ativar a conta.");
                    trocar('login');
                } else {
                    alert(data.error || "Erro no cadastro.");
                }
            } catch (err) { alert("Erro de rede."); }
            finally { btn.disabled = false; btn.innerText = "Finalizar Cadastro"; }
        }

        async function solicitarRecuperacao() {
            const email = document.getElementById('f-email').value;
            if (!email) return alert("Informe seu e-mail.");
            try {
                const res = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                if (res.ok) {
                    alert("Se o e-mail existir, as instruções foram enviadas.");
                    trocar('login');
                }
            } catch (err) { alert("Erro ao processar."); }
        }

        // --- CHAT LOGIC ---
        socket.on('historico_mensagens', (mensagens) => {
            const chatBox = document.getElementById('user-chat-box');
            chatBox.innerHTML = ""; 
            if (mensagens.length === 0) {
                renderizarMensagemUser({ usuario: "Sistema", texto: "Olá! Como podemos ajudar você hoje?" });
            } else {
                mensagens.forEach(data => renderizarMensagemUser(data));
            }
        });

        socket.on('receber_mensagem', (data) => {
            renderizarMensagemUser(data);
            const nomeAtual = localStorage.getItem('usuario') || "Visitante";
            if (data.usuario !== nomeAtual) {
                somUser.play().catch(()=>{});
                if (chatWindow.classList.contains('hidden')) badge.classList.remove('hidden');
            }
        });

        function renderizarMensagemUser(data) {
            const chatBox = document.getElementById('user-chat-box');
            const nomeAtual = localStorage.getItem('usuario') || "Visitante";
            const souEu = data.usuario === nomeAtual;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `p-3 rounded-xl max-w-[85%] animate-in fade-in slide-in-from-bottom-2 duration-300 ${souEu ? 'bg-blue-600 text-white self-end rounded-tr-none shadow-md' : 'bg-slate-800 text-slate-200 self-start rounded-tl-none border border-white/5'}`;
            msgDiv.innerHTML = `<p class="text-[8px] font-bold opacity-50 mb-1 uppercase">${data.usuario}</p><p>${data.texto}</p>`;
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function enviarMensagemUsuario() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;
            
            atualizarSala();
            socket.emit('enviar_mensagem', { 
                nome: localStorage.getItem('usuario') || "Visitante", 
                mensagem: msg, 
                salaId: emailSala 
            });
            input.value = "";
        }
    </script>
</body>
</html>
