<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Gateway DATASUS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card {
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 5px rgba(59, 130, 246, 0.5);
        }
        .btn-primary:hover {
            background: #2563eb !important;
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            background: #64748b !important;
            cursor: not-allowed;
            opacity: 0.7;
        }
        a:hover { text-decoration: underline !important; }
        
        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 38px;
            cursor: pointer;
            color: #94a3b8;
            transition: 0.2s;
            z-index: 10;
        }
    </style>
    <script>
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0f172a; margin: 0; font-family: 'Segoe UI', system-ui, sans-serif;">

    <div id="login-container" class="glass-card" style="width: 350px; text-align: center; padding: 30px; border-radius: 20px; background: rgba(30, 41, 59, 0.7);">
        <h2 style="margin-bottom: 25px; color: white; font-weight: 800; letter-spacing: -1px;">GATEWAY <span style="color:#3b82f6">SUS</span></h2>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; text-align: left; color: #94a3b8; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase;">E-mail</label>
            <input type="email" id="l-email" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box;" placeholder="seu@email.com">
        </div>
        
        <div style="margin-bottom: 20px; position: relative;">
            <label style="display: block; text-align: left; color: #94a3b8; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase;">Senha</label>
            <input type="password" id="l-pass" style="width: 100%; padding: 12px; padding-right: 40px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box;" placeholder="••••••••">
            <span class="toggle-btn" onclick="toggleView('l-pass', this)"><i class="fa-solid fa-eye"></i></span>
        </div>
        
        <button id="btn-entrar" class="btn-primary" onclick="entrar()" style="width: 100%; padding: 14px; border-radius: 8px; border: none; background: #3b82f6; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s;">Entrar no Sistema</button>
        
        <p style="font-size: 0.85rem; margin-top: 20px; color: #94a3b8;">
            <a href="javascript:void(0)" onclick="trocar('forgot')" style="color:#3b82f6; text-decoration: none; font-weight: 500;">Esqueci a senha</a> 
            <span style="margin: 0 10px; opacity: 0.3;">|</span>
            <a href="javascript:void(0)" onclick="trocar('signup')" style="color:#3b82f6; text-decoration: none; font-weight: 500;">Criar conta</a>
        </p>
    </div>

    <div id="signup-container" class="glass-card" style="width: 350px; text-align: center; display: none; padding: 30px; border-radius: 20px; background: rgba(30, 41, 59, 0.7);">
        <h3 style="color: white; margin-bottom: 20px;">Nova Conta</h3>
        <div style="margin-bottom: 15px;">
            <label style="display: block; text-align: left; color: #94a3b8; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600;">NOME COMPLETO</label>
            <input type="text" id="r-nome" style="width: 100%; padding: 12px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: block; text-align: left; color: #94a3b8; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600;">E-MAIL</label>
            <input type="email" id="r-email" style="width: 100%; padding: 12px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 20px; position: relative;">
            <label style="display: block; text-align: left; color: #94a3b8; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600;">SENHA</label>
            <input type="password" id="r-pass" style="width: 100%; padding: 12px; padding-right: 40px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155; box-sizing: border-box;">
            <span class="toggle-btn" onclick="toggleView('r-pass', this)"><i class="fa-solid fa-eye"></i></span>
        </div>
        <button id="btn-registrar" class="btn-primary" onclick="registrar()" style="width: 100%; padding: 14px; border-radius: 8px; background: #3b82f6; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 1rem;">Finalizar Cadastro</button>
        <button onclick="trocar('login')" style="background:none; border:none; color:#94a3b8; margin-top:20px; cursor:pointer; font-size: 0.85rem;">← Voltar ao Login</button>
    </div>

    <div id="forgot-container" class="glass-card" style="width: 350px; text-align: center; display: none; padding: 30px; border-radius: 20px; background: rgba(30, 41, 59, 0.7);">
        <h3 style="color: white; margin-bottom: 10px;">Recuperar Senha</h3>
        <p style="color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px;">Insira seu e-mail para receber as instruções.</p>
        <div style="margin-bottom: 20px;">
            <label style="display: block; text-align: left; color: #94a3b8; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600;">E-MAIL</label>
            <input type="email" id="f-email" style="width: 100%; padding: 12px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155; box-sizing: border-box;" placeholder="seu@email.com">
        </div>
        <button class="btn-primary" onclick="solicitarRecuperacao()" id="btn-forgot" style="width: 100%; padding: 14px; border-radius: 8px; background: #3b82f6; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.3s;">Enviar Instruções</button>
        <button onclick="trocar('login')" style="background:none; border:none; color:#94a3b8; margin-top:20px; cursor:pointer; font-size: 0.85rem;">← Voltar ao Login</button>
    </div>

    <script>
        function toggleView(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function trocar(tela) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('signup-container').style.display = 'none';
            document.getElementById('forgot-container').style.display = 'none';
            if (tela === 'signup') document.getElementById('signup-container').style.display = 'block';
            else if (tela === 'forgot') document.getElementById('forgot-container').style.display = 'block';
            else document.getElementById('login-container').style.display = 'block';
        }

        async function entrar() {
            const email = document.getElementById('l-email').value;
            const senha = document.getElementById('l-pass').value;
            const btn = document.getElementById('btn-entrar');

            if (!email || !senha) return alert("Preencha todos os campos.");

            btn.disabled = true;
            btn.innerText = "Autenticando...";

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token); 
                    localStorage.setItem('usuario', data.user);
                    localStorage.setItem('email', data.email);
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || "Erro ao logar");
                }
            } catch (err) {
                alert("Erro ao conectar ao servidor.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Entrar no Sistema";
            }
        }

        async function registrar() {
            const nome = document.getElementById('r-nome').value;
            const email = document.getElementById('r-email').value;
            const senha = document.getElementById('r-pass').value;
            const btn = document.getElementById('btn-registrar');

            if (!nome || !email || !senha) return alert("Preencha todos os campos.");

            btn.disabled = true;
            btn.innerText = "Cadastrando...";

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha })
                });
                const data = await res.json();

                if (res.ok) {
                    alert("Conta criada! Verifique seu e-mail para ativar.");
                    trocar('login');
                } else {
                    alert(data.error || "Erro ao registrar");
                }
            } catch (err) {
                alert("Erro de conexão.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Finalizar Cadastro";
            }
        }

        async function solicitarRecuperacao() {
            const email = document.getElementById('f-email').value;
            const btn = document.getElementById('btn-forgot');

            if (!email) return alert("Informe seu e-mail.");

            btn.disabled = true;
            btn.innerText = "Enviando...";

            try {
                const res = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (res.ok) {
                    alert("Se o e-mail existir, você receberá as instruções em breve.");
                    trocar('login');
                } else {
                    alert(data.error || "Erro ao solicitar");
                }
            } catch (err) {
                alert("Erro de conexão.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar Instruções";
            }
        }
    </script>
</body>
</html>
