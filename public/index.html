<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | Gateway DATASUS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            /* Configuração do Wallpaper com overlay escuro para leitura */
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .glass-card {
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }
        input:focus {
            outline: none;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.4);
        }
        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 42px;
            cursor: pointer;
            color: #64748b;
            transition: 0.2s;
        }
        .toggle-btn:hover { color: #3b82f6; }
    </style>
    <script>
        // Se já houver token, pula o login automaticamente
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-sans text-slate-200">

    <div id="login-container" class="glass-card w-full max-w-[400px] p-8 rounded-3xl bg-slate-800/40">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black tracking-tighter text-white">GATEWAY <span class="text-blue-500">SUS</span></h2>
            <p class="text-slate-400 text-sm mt-1 font-medium uppercase tracking-widest">Gestão de Informação DHS</p>
        </div>
        
        <div class="space-y-5">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">E-mail de Acesso</label>
                <input type="email" id="l-email" class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-white transition-all" placeholder="nome@exemplo.com">
            </div>
            
            <div class="relative">
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">Sua Senha</label>
                <input type="password" id="l-pass" class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-white transition-all" placeholder="••••••••">
                <span class="toggle-btn" onclick="toggleView('l-pass', this)"><i class="fa-solid fa-eye"></i></span>
            </div>
            
            <button id="btn-entrar" onclick="entrar()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-600/20">
                Entrar no Sistema
            </button>
        </div>
        
        <div class="mt-8 flex justify-between items-center text-xs font-bold uppercase tracking-tighter">
            <a href="javascript:void(0)" onclick="trocar('forgot')" class="text-slate-400 hover:text-blue-400 transition-colors">Esqueci a senha</a>
            <a href="javascript:void(0)" onclick="trocar('signup')" class="text-blue-500 hover:text-blue-400 transition-colors underline underline-offset-4">Criar Conta</a>
        </div>
    </div>

    <div id="signup-container" class="glass-card w-full max-w-[400px] p-8 rounded-3xl bg-slate-800/40 hidden">
        <div class="text-center mb-6">
            <h3 class="text-xl font-bold text-white">Nova Conta</h3>
            <p class="text-slate-400 text-sm">Preencha os dados para acesso.</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">Nome Completo</label>
                <input type="text" id="r-nome" class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-white transition-all">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">E-mail</label>
                <input type="email" id="r-email" class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-white transition-all">
            </div>
            <div class="relative">
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">Senha</label>
                <input type="password" id="r-pass" class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-white transition-all">
                <span class="toggle-btn" onclick="toggleView('r-pass', this)"><i class="fa-solid fa-eye"></i></span>
            </div>
            <button id="btn-registrar" onclick="registrar()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all active:scale-95 mt-2">
                Finalizar Cadastro
            </button>
            <button onclick="trocar('login')" class="w-full text-slate-400 text-xs font-bold uppercase py-2 hover:text-white transition-colors">
                ← Voltar ao Login
            </button>
        </div>
    </div>

    <div id="forgot-container" class="glass-card w-full max-w-[400px] p-8 rounded-3xl bg-slate-800/40 hidden text-center">
        <i class="fa-solid fa-lock-open text-blue-500 text-4xl mb-4"></i>
        <h3 class="text-xl font-bold text-white mb-2">Recuperar Senha</h3>
        <p class="text-slate-400 text-sm mb-6">Enviaremos um link de redefinição para o seu e-mail.</p>

        <div class="space-y-4">
            <div class="text-left">
                <label class="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">E-mail Cadastrado</label>
                <input type="email" id="f-email" class="w-full bg-slate-900/80 border border-slate-700 p-3 rounded-xl text-white transition-all" placeholder="seu@email.com">
            </div>
            <button id="btn-forgot" onclick="solicitarRecuperacao()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-600/20">
                Enviar Instruções
            </button>
            <button onclick="trocar('login')" class="w-full text-slate-400 text-xs font-bold uppercase py-2 hover:text-white transition-colors">
                ← Voltar ao Login
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('login-container').style.display !== 'none') entrar();
            }
        });

        function toggleView(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function trocar(tela) {
            const containers = ['login-container', 'signup-container', 'forgot-container'];
            containers.forEach(c => document.getElementById(c).style.display = 'none');
            
            if (tela === 'signup') document.getElementById('signup-container').style.display = 'block';
            else if (tela === 'forgot') document.getElementById('forgot-container').style.display = 'block';
            else document.getElementById('login-container').style.display = 'block';
        }

        async function entrar() {
            const email = document.getElementById('l-email').value;
            const senha = document.getElementById('l-pass').value;
            const btn = document.getElementById('btn-entrar');

            if (!email || !senha) return alert("Preencha todos os campos.");

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Autenticando...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token); 
                    localStorage.setItem('usuario', data.user);
                    localStorage.setItem('email', data.email);
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || "E-mail ou senha incorretos.");
                }
            } catch (err) {
                alert("Servidor indisponível no momento.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Entrar no Sistema";
            }
        }

        async function registrar() {
            const nome = document.getElementById('r-nome').value;
            const email = document.getElementById('r-email').value;
            const senha = document.getElementById('r-pass').value;
            const btn = document.getElementById('btn-registrar');

            if (!nome || !email || !senha) return alert("Preencha todos os campos.");

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Criando conta...';

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha })
                });
                const data = await res.json();

                if (res.ok) {
                    alert("✅ Conta criada! Verifique seu e-mail para ativar.");
                    trocar('login');
                } else {
                    alert(data.error || "Erro ao registrar.");
                }
            } catch (err) {
                alert("Erro de conexão.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Finalizar Cadastro";
            }
        }

        async function solicitarRecuperacao() {
            const email = document.getElementById('f-email').value;
            const btn = document.getElementById('btn-forgot');

            if (!email) return alert("Informe seu e-mail.");

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Enviando...';

            try {
                const res = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                if (res.ok) {
                    alert("📧 Se o e-mail estiver cadastrado, você receberá o link em instantes.");
                    trocar('login');
                } else {
                    const data = await res.json();
                    alert(data.error || "Erro ao solicitar.");
                }
            } catch (err) {
                alert("Erro de conexão.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar Instruções";
            }
        }
    </script>
</body>
</html>
