<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha - Gateway DATASUS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: #0f172a; 
            margin: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
        }
        
        .glass-card { 
            width: 380px; 
            padding: 35px; 
            border-radius: 20px; 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 20px; position: relative; }

        .input-group label {
            display: block; 
            color: #94a3b8; 
            margin-bottom: 8px; 
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group input {
            width: 100%; 
            padding: 12px 15px; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .btn-modern { 
            width: 100%; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px;
            font-size: 1rem;
            transition: 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-modern:hover:not(:disabled) { 
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-modern:disabled {
            background: #1e293b;
            color: #64748b;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-hint {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2 style="text-align: center; margin: 0 0 8px 0; font-weight: 800; font-size: 1.5rem;">
            Nova <span style="color:#3b82f6">Senha</span>
        </h2>
        <p style="text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 25px;">
            Digite sua nova credencial abaixo.
        </p>
        
        <form id="resetForm">
            <div class="input-group">
                <label for="new-pass">Nova senha</label>
                <input type="password" id="new-pass" placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
            </div>

            <div class="input-group">
                <label for="confirm-pass">Confirme a senha</label>
                <input type="password" id="confirm-pass" placeholder="Repita a senha" required autocomplete="new-password">
                <p id="match-error" class="error-hint">As senhas não coincidem.</p>
            </div>

            <button type="submit" id="btn-submit" class="btn-modern">
                <div id="loader" class="spinner"></div>
                <span id="btn-text">Atualizar Senha</span>
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 25px;">
            <a href="index.html" style="color: #64748b; text-decoration: none; font-size: 0.85rem; transition: 0.2s;" onmouseover="this.style.color='#94a3b8'" onmouseout="this.style.color='#64748b'">
                <i class="fa-solid fa-arrow-left"></i> Voltar ao login
            </a>
        </div>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        
        // Função para capturar o token da URL
        const getUrlToken = () => {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('token');
        };

        // Bloqueia acesso se não houver token na URL
        window.addEventListener('load', () => {
            const token = getUrlToken();
            if (!token) {
                alert("⚠️ Link de recuperação inválido ou ausente.");
                window.location.href = 'index.html';
            }
        });

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const btn = document.getElementById('btn-submit');
            const btnText = document.getElementById('btn-text');
            const loader = document.getElementById('loader');
            const novaSenha = document.getElementById('new-pass').value;
            const confirma = document.getElementById('confirm-pass').value;
            const matchError = document.getElementById('match-error');
            const token = getUrlToken();

            // 1. Validações locais
            if (novaSenha.length < 6) {
                alert("⚠️ A senha deve ter pelo menos 6 caracteres.");
                return;
            }

            if (novaSenha !== confirma) {
                matchError.style.display = 'block';
                return;
            } else {
                matchError.style.display = 'none';
            }

            // 2. Interface de Loading
            btn.disabled = true;
            btnText.innerText = "Processando...";
            loader.style.display = "block";

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: token, 
                        novaSenha: novaSenha 
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    alert("✅ Senha alterada com sucesso!");
                    window.location.href = 'index.html'; 
                } else {
                    // Trata erro de token expirado ou inválido vindo do server.js
                    alert("❌ " + (data.error || "Erro ao atualizar senha."));
                    resetButton();
                }
            } catch (err) {
                console.error("Erro de conexão:", err);
                alert("❌ Falha na comunicação com o servidor.");
                resetButton();
            }
        });

        function resetButton() {
            const btn = document.getElementById('btn-submit');
            const btnText = document.getElementById('btn-text');
            const loader = document.getElementById('loader');
            btn.disabled = false;
            btnText.innerText = "Atualizar Senha";
            loader.style.display = "none";
        }
    </script>
</body>
</html>
