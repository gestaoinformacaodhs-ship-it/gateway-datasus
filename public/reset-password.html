<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha - Gateway DATASUS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: #0f172a; 
            margin: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
        }
        
        .glass-card { 
            width: 100%;
            max-width: 400px; 
            padding: 35px; 
            border-radius: 20px; 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            margin: 20px;
        }

        .input-group { margin-bottom: 20px; position: relative; }

        .input-group label {
            display: block; 
            color: #94a3b8; 
            margin-bottom: 8px; 
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group input {
            width: 100%; 
            padding: 12px 15px; 
            padding-right: 45px;
            border-radius: 8px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            color: #64748b;
            cursor: pointer;
            transition: 0.2s;
        }

        .toggle-password:hover { color: #3b82f6; }

        .btn-modern { 
            width: 100%; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px;
            font-size: 1rem;
            transition: 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-modern:hover:not(:disabled) { 
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-modern:active:not(:disabled) { transform: translateY(0); }

        .btn-modern:disabled {
            background: #1e293b;
            color: #64748b;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-hint {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 6px;
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2 style="text-align: center; margin: 0 0 8px 0; font-weight: 800; font-size: 1.5rem;">
            Nova <span style="color:#3b82f6">Senha</span>
        </h2>
        <p style="text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 25px;">
            Digite sua nova credencial de acesso.
        </p>
        
        <form id="resetForm">
            <div class="input-group">
                <label for="new-pass">Nova senha</label>
                <div class="input-wrapper">
                    <input type="password" id="new-pass" placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePass('new-pass', this)"></i>
                </div>
            </div>

            <div class="input-group">
                <label for="confirm-pass">Confirme a senha</label>
                <div class="input-wrapper">
                    <input type="password" id="confirm-pass" placeholder="Repita a senha" required autocomplete="new-password">
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePass('confirm-pass', this)"></i>
                </div>
                <p id="match-error" class="error-hint">
                    <i class="fa-solid fa-circle-exclamation"></i> As senhas não coincidem.
                </p>
            </div>

            <button type="submit" id="btn-submit" class="btn-modern">
                <div id="loader" class="spinner"></div>
                <span id="btn-text">Atualizar Senha</span>
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 25px;">
            <a href="index.html" style="color: #64748b; text-decoration: none; font-size: 0.85rem; transition: 0.2s; font-weight: 500;" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#64748b'">
                <i class="fa-solid fa-arrow-left" style="font-size: 0.75rem;"></i> Voltar ao login
            </a>
        </div>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        const newPassInput = document.getElementById('new-pass');
        const confirmPassInput = document.getElementById('confirm-pass');
        const matchError = document.getElementById('match-error');

        // Alternar visibilidade da senha
        function togglePass(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Captura o token da URL
        const getUrlToken = () => {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('token')?.trim();
        };

        // Validação em tempo real
        [newPassInput, confirmPassInput].forEach(input => {
            input.addEventListener('input', () => {
                if (confirmPassInput.value && newPassInput.value !== confirmPassInput.value) {
                    matchError.style.display = 'block';
                } else {
                    matchError.style.display = 'none';
                }
            });
        });

        // Bloqueia acesso inicial se não houver token
        window.addEventListener('load', () => {
            if (!getUrlToken()) {
                alert("⚠️ Link de recuperação inválido ou expirado.");
                window.location.href = 'index.html';
            }
        });

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const btn = document.getElementById('btn-submit');
            const btnText = document.getElementById('btn-text');
            const loader = document.getElementById('loader');
            const novaSenha = newPassInput.value;
            const confirma = confirmPassInput.value;
            const token = getUrlToken();

            if (novaSenha.length < 6) {
                alert("⚠️ A senha deve ter pelo menos 6 caracteres.");
                return;
            }

            if (novaSenha !== confirma) {
                matchError.style.display = 'block';
                confirmPassInput.focus();
                return;
            }

            // Interface de Processamento
            btn.disabled = true;
            btnText.innerText = "Salvando...";
            loader.style.display = "block";

            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: token, 
                        novaSenha: novaSenha 
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    alert("✅ Senha atualizada com sucesso! Faça login agora.");
                    window.location.href = 'index.html'; 
                } else {
                    alert("❌ " + (data.error || "Erro ao processar solicitação."));
                    resetButton();
                }
            } catch (err) {
                console.error("Erro de rede:", err);
                alert("❌ Erro de conexão com o servidor.");
                resetButton();
            }
        });

        function resetButton() {
            const btn = document.getElementById('btn-submit');
            const btnText = document.getElementById('btn-text');
            const loader = document.getElementById('loader');
            btn.disabled = false;
            btnText.innerText = "Atualizar Senha";
            loader.style.display = "none";
        }
    </script>
</body>
</html>
