<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha - Gateway DATASUS</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: #0f172a; 
            margin: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
        }
        
        .glass-card { 
            width: 350px; 
            padding: 35px; 
            border-radius: 20px; 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .input-group label {
            display: block; 
            color: #94a3b8; 
            margin-bottom: 8px; 
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box;
            transition: 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        .btn-modern { 
            width: 100%; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-modern:hover { 
            background: #2563eb;
            transform: translateY(-1px);
        }

        .btn-modern:disabled {
            background: #1e293b;
            color: #64748b;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 5px; font-weight: 800;">Nova <span style="color:#3b82f6">Senha</span></h2>
        <p style="text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 25px;">Defina sua nova credencial de acesso.</p>
        
        <div class="input-group" style="margin-bottom: 20px;">
            <label for="new-pass">Nova senha</label>
            <input type="password" id="new-pass" placeholder="Mínimo 4 caracteres">
        </div>

        <div class="input-group" style="margin-bottom: 25px;">
            <label for="confirm-pass">Confirme a senha</label>
            <input type="password" id="confirm-pass" placeholder="Digite novamente">
        </div>

        <button onclick="enviarNovaSenha()" id="btn-submit" class="btn-modern">Atualizar Senha</button>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: #64748b; text-decoration: none; font-size: 0.85rem;">← Cancelar e voltar</a>
        </div>
    </div>

    <script>
        async function enviarNovaSenha() {
            const btn = document.getElementById('btn-submit');
            const novaSenha = document.getElementById('new-pass').value;
            const confirma = document.getElementById('confirm-pass').value;

            // 1. Extrair o token da URL de forma robusta
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token')?.trim(); // .trim() remove espaços acidentais

            // 2. Validações de Interface
            if (!token) {
                return alert("Erro: Link de recuperação inválido. Por favor, solicite um novo e-mail.");
            }
            if (!novaSenha || novaSenha.length < 4) {
                return alert("A nova senha deve ter pelo menos 4 caracteres.");
            }
            if (novaSenha !== confirma) {
                return alert("As senhas não coincidem. Verifique a digitação.");
            }

            // 3. Bloquear botão para evitar múltiplos cliques
            btn.disabled = true;
            btn.innerText = "Processando...";

            try {
                // 4. Chamada para a API
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, novaSenha })
                });

                const data = await res.json();

                if (res.ok) {
                    alert("Sucesso! Sua senha foi redefinida com êxito.");
                    window.location.href = 'index.html'; // Redireciona para o login
                } else {
                    // Exibe o erro vindo do servidor (ex: "Link expirado")
                    alert(data.error || "Ocorreu um erro ao atualizar a senha.");
                    btn.disabled = false;
                    btn.innerText = "Atualizar Senha";
                }
            } catch (err) {
                console.error("Erro na requisição:", err);
                alert("Erro técnico: Não foi possível alcançar o servidor.");
                btn.disabled = false;
                btn.innerText = "Atualizar Senha";
            }
        }
    </script>
</body>
</html>
