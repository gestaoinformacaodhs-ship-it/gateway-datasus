<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | Suporte Arpoador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-shield-halved text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-black text-white italic">CONSOLE <span class="text-blue-500">ADMIN</span></h1>
            <p class="text-slate-400 text-sm mt-2">Área exclusiva para suporte técnico</p>
        </div>

        <div id="login-form" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Senha de Acesso</label>
                <input type="password" id="admin-pass" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white focus:border-blue-500 outline-none transition-all" placeholder="••••••••">
            </div>

            <button onclick="verificarAcesso()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-600/20">
                ENTRAR NO CONSOLE
            </button>

            <button onclick="mostrarRecuperar()" class="w-full text-slate-500 hover:text-blue-400 text-xs font-bold uppercase tracking-widest transition-colors">
                Esqueceu a senha?
            </button>
        </div>

        <div id="recovery-form" class="hidden space-y-6">
            <p class="text-slate-400 text-sm text-center">Insira o e-mail administrativo para receber a chave de acesso.</p>
            <input type="email" id="recovery-email" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white focus:border-blue-500 outline-none transition-all" placeholder="suporte@exemplo.com">
            
            <button id="btn-enviar-codigo" onclick="enviarCodigo()" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-xl transition-all flex justify-center items-center gap-2">
                ENVIAR CÓDIGO
            </button>
            
            <button onclick="voltarLogin()" class="w-full text-slate-500 text-xs font-bold uppercase tracking-widest hover:text-white transition-colors">
                Voltar ao Login
            </button>
        </div>
    </div>

    <script>
        function verificarAcesso() {
            const senha = document.getElementById('admin-pass').value;
            // Validação simples para o console admin
            if (senha === "2024") { 
                sessionStorage.setItem('admin_autenticado', 'true');
                window.location.href = 'admin.html';
            } else {
                alert("Senha administrativa incorreta!");
            }
        }

        function mostrarRecuperar() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('recovery-form').classList.remove('hidden');
        }

        function voltarLogin() {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('recovery-form').classList.add('hidden');
        }

        async function enviarCodigo() {
            const emailInput = document.getElementById('recovery-email');
            const btn = document.getElementById('btn-enviar-codigo');
            const email = emailInput.value.trim();

            if(!email) return alert("Por favor, digite o e-mail administrativo.");

            // Feedback visual de carregamento
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> ENVIANDO...';

            try {
                const response = await fetch('/api/recuperar-senha-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const result = await response.json();

                if (result.success) {
                    alert("Se o e-mail estiver correto, você receberá a senha em instantes.");
                    voltarLogin();
                } else {
                    alert("Ocorreu um erro ao processar a solicitação.");
                }
            } catch (err) {
                console.error("Erro na recuperação:", err);
                alert("Erro ao conectar com o servidor.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'ENVIAR CÓDIGO';
            }
        }

        // Atalho: Enter no campo de senha aciona o login
        document.getElementById('admin-pass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verificarAcesso();
        });
    </script>
</body>
</html>
