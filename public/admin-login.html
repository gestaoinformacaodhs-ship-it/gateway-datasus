<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | Suporte Arpoador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; }
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        /* Efeito de foco suave no input */
        input:focus {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl transition-all">
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-shield-halved text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-black text-white italic tracking-tighter">CONSOLE <span class="text-blue-500">ADMIN</span></h1>
            <p class="text-slate-400 text-sm mt-2 font-medium">Área exclusiva para suporte técnico</p>
        </div>

        <div id="login-form" class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500 mb-2 ml-1">Chave de Segurança</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                        <i class="fa-solid fa-key text-sm"></i>
                    </span>
                    <input type="password" id="admin-pass" 
                        class="w-full bg-slate-900/50 border border-slate-700 p-4 pl-11 rounded-xl text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-700" 
                        placeholder="Insira a senha master">
                </div>
            </div>

            <button onclick="verificarAcesso()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-600/20 active:scale-[0.98]">
                ENTRAR NO CONSOLE
            </button>

            <button onclick="mostrarRecuperar()" class="w-full text-slate-500 hover:text-blue-400 text-[10px] font-bold uppercase tracking-widest transition-colors">
                Esqueceu a senha master?
            </button>
        </div>

        <div id="recovery-form" class="hidden space-y-6 animate-in fade-in duration-300">
            <p class="text-slate-400 text-sm text-center px-4">Insira o e-mail administrativo para receber as instruções de acesso.</p>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                    <i class="fa-solid fa-envelope text-sm"></i>
                </span>
                <input type="email" id="recovery-email" 
                    class="w-full bg-slate-900/50 border border-slate-700 p-4 pl-11 rounded-xl text-white focus:border-blue-500 outline-none transition-all placeholder:text-slate-700" 
                    placeholder="suporte@gateway.com">
            </div>
            
            <button id="btn-enviar-codigo" onclick="enviarCodigo()" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-4 rounded-xl transition-all flex justify-center items-center gap-2">
                SOLICITAR ACESSO
            </button>
            
            <button onclick="voltarLogin()" class="w-full text-slate-500 text-[10px] font-bold uppercase tracking-widest hover:text-white transition-colors">
                <i class="fa-solid fa-chevron-left mr-1"></i> Voltar ao Login
            </button>
        </div>
    </div>

    <script>
        // Verificação de acesso (mantenha a lógica de segurança no servidor se possível)
        function verificarAcesso() {
            const senha = document.getElementById('admin-pass').value;
            
            // Sugestão: No futuro, valide isso via API para não deixar a senha no front-end
            if (senha === "2024") { 
                sessionStorage.setItem('admin_autenticado', 'true');
                sessionStorage.setItem('admin_role', 'master');
                sessionStorage.setItem('admin_nome', 'Administrador Master');
                window.location.href = 'admin.html';
            } else {
                alert("⚠️ Acesso Negado: Senha administrativa inválida.");
                document.getElementById('admin-pass').value = "";
                document.getElementById('admin-pass').focus();
            }
        }

        function mostrarRecuperar() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('recovery-form').classList.remove('hidden');
        }

        function voltarLogin() {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('recovery-form').classList.add('hidden');
        }

        async function enviarCodigo() {
            const emailInput = document.getElementById('recovery-email');
            const btn = document.getElementById('btn-enviar-codigo');
            const email = emailInput.value.trim();

            if(!email) return alert("Por favor, digite o e-mail administrativo.");

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> ENVIANDO...';

            try {
                // Certifique-se que esta rota existe no seu server.js
                const response = await fetch('/api/recuperar-senha', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const result = await response.json();

                if (response.ok) {
                    alert("✅ Se o e-mail administrativo for válido, você receberá a chave em breve.");
                    voltarLogin();
                } else {
                    alert("❌ Erro: " + (result.error || "Não foi possível processar."));
                }
            } catch (err) {
                console.error("Erro na recuperação:", err);
                alert("❌ Erro ao conectar com o servidor.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'SOLICITAR ACESSO';
            }
        }

        // Atalho de teclado
        document.getElementById('admin-pass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verificarAcesso();
        });
    </script>
</body>
</html>
