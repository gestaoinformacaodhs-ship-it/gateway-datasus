<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | Gateway DATASUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            background: #0f172a;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at top right, rgba(37, 99, 235, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(30, 41, 59, 0.5), transparent);
        }

        .glass-card {
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            background: rgba(30, 41, 59, 0.5);
        }

        input:focus {
            outline: none;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #475569;
            transition: color 0.2s;
        }
        .toggle-password:hover { color: #3b82f6; }
    </style>
    <script>
        // Proteção de rota simples
        if (!localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }
    </script>
</head>
<body class="text-slate-200 min-h-screen">

    <nav class="border-b border-white/5 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-blue-500">GATEWAY <span class="text-white">SUS</span></h1>
            <a href="dashboard.html" class="text-slate-400 hover:text-white transition-all text-xs font-bold uppercase tracking-widest flex items-center">
                <i class="fa-solid fa-arrow-left mr-2"></i> Dashboard
            </a>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6 mt-8">
        <div class="glass-card rounded-3xl overflow-hidden shadow-2xl">
            <div class="bg-blue-600 p-8">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center border border-white/30">
                        <i class="fa-solid fa-user-gear text-3xl text-white"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black text-white tracking-tight">Configurações de Perfil</h2>
                        <p class="text-blue-100/70 text-sm font-medium">Gerencie sua identidade no ecossistema DATASUS.</p>
                    </div>
                </div>
            </div>

            <form id="form-perfil" class="p-8 space-y-6">
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.15em] text-slate-500 mb-2 ml-1">Nome Completo</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-id-card text-sm"></i>
                        </span>
                        <input type="text" id="nome" required
                            class="w-full bg-slate-950/50 text-white rounded-xl pl-11 pr-4 py-3.5 focus:outline-none border border-white/5 transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.15em] text-slate-500 mb-2 ml-1">E-mail de Acesso (Permanente)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-600">
                            <i class="fa-solid fa-envelope text-sm"></i>
                        </span>
                        <input type="email" id="email" readonly
                            class="w-full bg-slate-800/30 text-slate-500 rounded-xl pl-11 pr-4 py-3.5 border border-white/5 cursor-not-allowed italic">
                    </div>
                </div>

                <div class="py-2">
                    <div class="h-px bg-gradient-to-r from-transparent via-slate-700 to-transparent"></div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.15em] text-slate-500 mb-2 ml-1">Nova Senha (Opcional)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-key text-sm"></i>
                        </span>
                        <input type="password" id="senha" placeholder="Mínimo 6 caracteres" oninput="avaliarForca()"
                            class="w-full bg-slate-950/50 text-white rounded-xl pl-11 pr-12 py-3.5 focus:outline-none border border-white/5 transition-all">
                        <span class="toggle-password" onclick="togglePass('senha')"><i class="fa-solid fa-eye"></i></span>
                    </div>
                    
                    <div class="px-1 mt-3">
                        <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                            <div id="barra-forca" class="w-0 h-full transition-all duration-500 bg-red-500"></div>
                        </div>
                        <p id="label-forca" class="text-[9px] uppercase font-bold text-slate-600 mt-1 tracking-widest text-right">Senha ausente</p>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.15em] text-slate-500 mb-2 ml-1">Confirmar Nova Senha</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-shield-check text-sm"></i>
                        </span>
                        <input type="password" id="confirmar_senha" placeholder="Repita a nova senha"
                            class="w-full bg-slate-950/50 text-white rounded-xl pl-11 pr-12 py-3.5 focus:outline-none border border-white/5 transition-all">
                        <span class="toggle-password" onclick="togglePass('confirmar_senha')"><i class="fa-solid fa-eye"></i></span>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" id="btn-salvar"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all duration-300 shadow-xl shadow-blue-600/10 flex justify-center items-center active:scale-[0.98] group">
                        <i class="fa-solid fa-check-circle mr-2 group-hover:scale-110 transition-transform"></i> Atualizar Perfil
                    </button>
                </div>
            </form>
        </div>
        
        <p class="text-center text-slate-600 text-[10px] mt-8 font-bold uppercase tracking-[0.2em]">
            Gateway DATASUS &copy; 2026 - Sistema de Segurança DHS
        </p>
    </main>

    <script>
        // Carregar dados iniciais
        window.onload = () => {
            const userNome = localStorage.getItem('usuario');
            const userEmail = localStorage.getItem('email');
            
            if (userNome) document.getElementById('nome').value = userNome;
            if (userEmail) document.getElementById('email').value = userEmail;
        };

        // Mostrar/Ocultar Senha
        function togglePass(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling.querySelector('i');
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        }

        // Avaliação de força com texto explicativo
        function avaliarForca() {
            const senha = document.getElementById('senha').value;
            const barra = document.getElementById('barra-forca');
            const label = document.getElementById('label-forca');
            let forca = 0;

            if (senha.length > 0) {
                if (senha.length >= 6) forca += 25;
                if (senha.match(/[a-z]/) && senha.match(/[A-Z]/)) forca += 25;
                if (senha.match(/[0-9]/)) forca += 25;
                if (senha.match(/[^a-zA-Z0-9]/)) forca += 25;
            }

            barra.style.width = forca + "%";
            
            if (forca === 0) {
                label.innerText = "Senha ausente";
                label.className = "text-[9px] uppercase font-bold text-slate-600 mt-1 tracking-widest text-right";
            } else if (forca <= 25) {
                barra.style.backgroundColor = "#ef4444";
                label.innerText = "Muito Fraca";
                label.classList.replace('text-slate-600', 'text-red-500');
            } else if (forca <= 50) {
                barra.style.backgroundColor = "#eab308";
                label.innerText = "Razoável";
                label.className = "text-[9px] uppercase font-bold text-yellow-500 mt-1 tracking-widest text-right";
            } else if (forca <= 75) {
                barra.style.backgroundColor = "#3b82f6";
                label.innerText = "Forte";
                label.className = "text-[9px] uppercase font-bold text-blue-500 mt-1 tracking-widest text-right";
            } else {
                barra.style.backgroundColor = "#10b981";
                label.innerText = "Excelente";
                label.className = "text-[9px] uppercase font-bold text-green-500 mt-1 tracking-widest text-right";
            }
        }

        // Envio do formulário
        const form = document.getElementById('form-perfil');
        const btn = document.getElementById('btn-salvar');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const confirma = document.getElementById('confirmar_senha').value;

            if (senha && (senha.length < 6 || senha !== confirma)) {
                return alert(senha.length < 6 ? "A senha deve ter no mínimo 6 caracteres." : "As senhas não coincidem.");
            }

            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-2"></i> Salvando...`;

            try {
                const res = await fetch('/api/update-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        nome, 
                        email, 
                        novaSenha: senha || null 
                    })
                });

                if (res.ok) {
                    localStorage.setItem('usuario', nome);
                    alert("✅ Perfil atualizado com sucesso!");
                    window.location.reload();
                } else {
                    const data = await res.json();
                    alert("❌ Erro: " + data.error);
                }
            } catch (err) {
                alert("❌ Servidor indisponível.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
