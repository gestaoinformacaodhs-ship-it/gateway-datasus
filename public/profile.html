<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | Gateway DATASUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            background: #0f172a;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at top right, rgba(37, 99, 235, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(30, 41, 59, 0.5), transparent);
        }

        .glass-card {
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            background: rgba(30, 41, 59, 0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        input:focus {
            outline: none;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
            background: rgba(15, 23, 42, 0.8) !important;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #475569;
            transition: color 0.2s;
            z-index: 10;
        }
        .toggle-password:hover { color: #3b82f6; }

        #barra-forca { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s; }

        /* Estilo específico para a Danger Zone */
        .danger-zone {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(239, 68, 68, 0.03);
        }
    </style>
    <script>
        if (!localStorage.getItem('usuario')) {
            window.location.href = 'index.html';
        }
    </script>
</head>
<body class="text-slate-200 min-h-screen pb-12">

    <nav class="border-b border-white/5 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-blue-500">GATEWAY <span class="text-white">SUS</span></h1>
            <a href="dashboard.html" class="text-slate-400 hover:text-white transition-all text-xs font-bold uppercase tracking-widest flex items-center">
                <i class="fa-solid fa-arrow-left mr-2"></i> Voltar ao Painel
            </a>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6 mt-8">
        <div class="glass-card rounded-3xl overflow-hidden">
            <div class="bg-blue-600 p-8">
                <div class="flex items-center gap-5">
                    <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center border border-white/30 shadow-inner">
                        <i class="fa-solid fa-user-gear text-3xl text-white"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black text-white tracking-tight">Configurações de Perfil</h2>
                        <p class="text-blue-100/70 text-sm font-medium">Gerencie sua identidade e segurança.</p>
                    </div>
                </div>
            </div>

            <form id="form-perfil" class="p-8 space-y-6">
                <div class="space-y-2">
                    <label class="block text-[10px] font-black uppercase tracking-[0.15em] text-slate-500 ml-1">Nome Completo</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-id-card text-sm"></i>
                        </span>
                        <input type="text" id="nome" required placeholder="Seu nome"
                            class="w-full bg-slate-950/40 text-white rounded-xl pl-11 pr-4 py-3.5 border border-white/5 transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-black uppercase tracking-[0.15em] text-slate-500 ml-1">E-mail Institucional</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-600">
                            <i class="fa-solid fa-envelope text-sm"></i>
                        </span>
                        <input type="email" id="email" readonly
                            class="w-full bg-slate-800/20 text-slate-500 rounded-xl pl-11 pr-4 py-3.5 border border-white/5 cursor-not-allowed italic">
                    </div>
                </div>

                <div class="py-4">
                    <div class="h-px bg-gradient-to-r from-transparent via-slate-700 to-transparent"></div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-black uppercase tracking-[0.15em] text-slate-500 ml-1">Alterar Senha (Opcional)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-key text-sm"></i>
                        </span>
                        <input type="password" id="senha" placeholder="Nova senha (mín. 6 chars)" oninput="avaliarForca()"
                            class="w-full bg-slate-950/40 text-white rounded-xl pl-11 pr-12 py-3.5 border border-white/5 transition-all">
                        <span class="toggle-password" onclick="togglePass('senha')"><i class="fa-solid fa-eye"></i></span>
                    </div>
                    
                    <div class="px-1 mt-3">
                        <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                            <div id="barra-forca" class="w-0 h-full bg-red-500"></div>
                        </div>
                        <p id="label-forca" class="text-[9px] uppercase font-bold text-slate-600 mt-2 tracking-widest text-right">Senha não informada</p>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-black uppercase tracking-[0.15em] text-slate-500 ml-1">Confirmar Nova Senha</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500">
                            <i class="fa-solid fa-shield-check text-sm"></i>
                        </span>
                        <input type="password" id="confirmar_senha" placeholder="Repita a nova senha"
                            class="w-full bg-slate-950/40 text-white rounded-xl pl-11 pr-12 py-3.5 border border-white/5 transition-all">
                        <span class="toggle-password" onclick="togglePass('confirmar_senha')"><i class="fa-solid fa-eye"></i></span>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="btn-salvar"
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all duration-300 shadow-lg shadow-blue-600/20 flex justify-center items-center active:scale-[0.98] group">
                        <i class="fa-solid fa-floppy-disk mr-2 group-hover:rotate-12 transition-transform"></i> 
                        <span>Salvar Alterações</span>
                    </button>
                </div>
            </form>

            <div class="danger-zone p-8">
                <div class="flex items-center gap-2 text-red-500 mb-4">
                    <i class="fa-solid fa-triangle-exclamation text-xs"></i>
                    <h3 class="text-[10px] font-black uppercase tracking-[0.2em]">Configurações Críticas</h3>
                </div>
                
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 p-5 rounded-2xl border border-red-500/20 bg-red-500/5">
                    <div class="space-y-1">
                        <h4 class="text-sm font-bold text-white">Excluir Conta Permanentemente</h4>
                        <p class="text-xs text-slate-500 leading-relaxed">Isso apagará seu acesso e todo o histórico de mensagens de suporte.</p>
                    </div>
                    <button type="button" id="btn-delete-account"
                        class="px-5 py-2.5 rounded-xl border border-red-500/30 text-red-500 text-xs font-black uppercase tracking-wider hover:bg-red-500 hover:text-white transition-all duration-300 active:scale-95">
                        Excluir Conta
                    </button>
                </div>
            </div>
        </div>
        
        <p class="text-center text-slate-600 text-[10px] mt-8 font-bold uppercase tracking-[0.2em]">
            Gateway DATASUS &copy; 2026 - Gestão de Acesso Seguro
        </p>
    </main>

    <script>
        // Carregar dados iniciais
        window.onload = () => {
            const userNome = localStorage.getItem('usuario');
            const userEmail = localStorage.getItem('email');
            
            if (userNome) document.getElementById('nome').value = userNome;
            if (userEmail) document.getElementById('email').value = userEmail;
        };

        // Alternar visibilidade da senha
        function togglePass(id) {
            const input = document.getElementById(id);
            const icon = input.parentElement.querySelector('.toggle-password i');
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        }

        // Avaliar força da senha
        function avaliarForca() {
            const senha = document.getElementById('senha').value;
            const barra = document.getElementById('barra-forca');
            const label = document.getElementById('label-forca');
            let forca = 0;

            if (senha.length > 0) {
                if (senha.length >= 6) forca += 25;
                if (senha.match(/[a-z]/) && senha.match(/[A-Z]/)) forca += 25;
                if (senha.match(/[0-9]/)) forca += 25;
                if (senha.match(/[^a-zA-Z0-9]/)) forca += 25;
            }

            barra.style.width = forca + "%";
            
            if (forca === 0) {
                label.innerText = "Senha não informada";
                label.className = "text-[9px] uppercase font-bold text-slate-600 mt-2 tracking-widest text-right";
                barra.style.backgroundColor = "transparent";
            } else if (forca <= 25) {
                label.innerText = "Fraca";
                label.className = "text-[9px] uppercase font-bold text-red-500 mt-2 tracking-widest text-right";
                barra.style.backgroundColor = "#ef4444";
            } else if (forca <= 50) {
                label.innerText = "Razoável";
                label.className = "text-[9px] uppercase font-bold text-yellow-500 mt-2 tracking-widest text-right";
                barra.style.backgroundColor = "#eab308";
            } else if (forca <= 75) {
                label.innerText = "Forte";
                label.className = "text-[9px] uppercase font-bold text-blue-500 mt-2 tracking-widest text-right";
                barra.style.backgroundColor = "#3b82f6";
            } else {
                label.innerText = "Segurança Máxima";
                label.className = "text-[9px] uppercase font-bold text-green-500 mt-2 tracking-widest text-right";
                barra.style.backgroundColor = "#10b981";
            }
        }

        // Salvar Perfil
        document.getElementById('form-perfil').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-salvar');
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const confirma = document.getElementById('confirmar_senha').value;

            if (senha && senha.length < 6) return alert("A senha deve ter 6+ caracteres.");
            if (senha !== confirma) return alert("As senhas não coincidem.");

            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin mr-2"></i>`;

            try {
                const res = await fetch('/api/update-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, novaSenha: senha || null })
                });

                if (res.ok) {
                    localStorage.setItem('usuario', nome);
                    alert("✅ Perfil atualizado!");
                    window.location.reload();
                } else {
                    alert("❌ Erro ao atualizar.");
                }
            } catch (err) {
                alert("❌ Erro de conexão.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        });

        // Lógica de Exclusão de Conta
        document.getElementById('btn-delete-account').addEventListener('click', async () => {
            const confirmacao = confirm("PERIGO: Você tem certeza que deseja excluir sua conta permanentemente? Esta ação não pode ser desfeita.");
            
            if (confirmacao) {
                const email = localStorage.getItem('email');
                
                try {
                    const res = await fetch('/api/delete-account', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });

                    if (res.ok) {
                        alert("Sua conta foi removida com sucesso.");
                        localStorage.clear();
                        window.location.href = 'index.html';
                    } else {
                        const data = await res.json();
                        alert("Erro: " + data.error);
                    }
                } catch (err) {
                    alert("Erro ao conectar com o servidor.");
                }
            }
        });
    </script>
</body>
</html>
