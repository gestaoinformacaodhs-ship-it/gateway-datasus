<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Gateway DATASUS</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body { 
            background-color: #0a0f1c; 
            color: #cbd5e1; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: #2563eb;
            background: rgba(30, 41, 59, 0.6);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0f1c; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2563eb; }

        /* Chat Styles */
        #chat-window {
            display: none;
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 380px;
            max-width: calc(100vw - 40px);
            height: 500px;
            flex-direction: column;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem;
            z-index: 100;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        #chat-window.active { display: flex; animation: slideUp 0.3s ease-out; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-header { background: #1d4ed8; color: white; padding: 1.25rem; display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg-user { align-self: flex-end; background: #1d4ed8; color: white; padding: 10px 14px; border-radius: 15px 15px 0 15px; max-width: 85%; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .msg-support { align-self: flex-start; background: #1e293b; color: #cbd5e1; padding: 10px 14px; border-radius: 15px 15px 15px 0; max-width: 85%; border: 1px solid rgba(255, 255, 255, 0.05); font-size: 13px; }
        
        .chat-btn { position: fixed; bottom: 25px; right: 25px; background: #2563eb; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-size: 24px; z-index: 101; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        .chat-btn:hover { transform: scale(1.1); }
    </style>

    <script>
        if (!localStorage.getItem('email')) {
            window.location.href = 'index.html';
        }
    </script>
</head>
<body class="min-h-screen flex flex-col">

    <header class="sticky top-0 z-40 bg-[#0a0f1c]/80 backdrop-blur-md border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h2 class="text-xl font-black tracking-tighter cursor-pointer text-white" onclick="location.reload()">
                GATEWAY <span class="text-blue-600">SUS</span>
            </h2>
            
            <div class="flex items-center gap-6">
                <div class="text-right hidden sm:block">
                    <span id="user-display" class="block text-sm font-bold text-white tracking-tight">Carregando...</span>
                    <div class="flex gap-3 justify-end mt-1">
                        <a href="profile.html" class="text-[10px] uppercase tracking-widest text-blue-500 hover:text-blue-400 font-bold transition-colors">
                            <i class="fa-solid fa-user-gear mr-1"></i> Perfil
                        </a>
                    </div>
                </div>
                <button onclick="logout()" class="bg-red-950/20 border border-red-900/50 text-red-500 hover:bg-red-600 hover:text-white px-4 py-2 rounded-lg text-xs font-bold transition-all flex items-center gap-2">
                    <i class="fa-solid fa-power-off"></i> Sair
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8 flex-1 w-full">
        <div class="mb-10">
            <h3 class="text-blue-600 uppercase text-[10px] font-black tracking-[0.3em] mb-2">Data Intelligence</h3>
            <h1 class="text-3xl font-bold text-white tracking-tight">Bases de Dados Arpoador</h1>
            <p class="text-slate-500 mt-2">Repositórios FTP oficiais e Portais de Orçamentos sincronizados.</p>
        </div>

        <div id="grid-sistemas" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>
        
    </main>



    <div id="chat-widget">
        <div id="chat-icon" onclick="toggleChat()" class="chat-btn">
            <i class="fa-solid fa-comment-dots"></i>
            <div id="chat-badge" class="hidden absolute top-0 right-0 w-4 h-4 bg-red-600 rounded-full border-2 border-[#0a0f1c] animate-pulse"></div>
        </div>

        <div id="chat-window">
            <div class="chat-header">
                <div class="flex items-center gap-3">
                    <div class="relative"><div class="w-2 h-2 bg-green-500 rounded-full"></div><div class="w-2 h-2 bg-green-500 rounded-full animate-ping absolute top-0 left-0"></div></div>
                    <span class="text-[10px] font-black tracking-widest uppercase">Suporte Técnico</span>
                </div>
                <button onclick="toggleChat()" class="hover:text-slate-300 transition-colors"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="chat-messages" class="chat-messages"></div>
            <div class="p-4 bg-slate-950/50 border-t border-white/5">
                <div class="flex items-center gap-3 bg-[#0a0f1c] border border-white/10 rounded-xl px-4 py-2">
                    <label for="chat-file" class="cursor-pointer text-slate-500 hover:text-blue-500 transition-colors">
                        <i class="fa-solid fa-paperclip text-lg"></i>
                        <input type="file" id="chat-file" class="hidden" onchange="enviarArquivo()">
                    </label>
                    <input type="text" id="chat-input" placeholder="Mensagem..." class="bg-transparent border-none focus:outline-none text-sm text-white flex-1">
                    <button onclick="enviarMensagem()" class="text-blue-500 hover:text-blue-400 transform hover:scale-110 transition-all"><i class="fa-solid fa-paper-plane text-xl"></i></button>
                </div>
            </div>
        </div>
    </div>

    <audio id="notificacao-som" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        const socket = io(); 
        const somNotificacao = document.getElementById('notificacao-som');
        const nomeUsuario = localStorage.getItem('usuario') || 'Usuário';
        const emailUsuario = localStorage.getItem('email'); 
        let sistemaAtual = '';
        let arquivosCache = [];

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('user-display').innerText = `Olá, ${nomeUsuario}`;
            
            // Definição dos Sistemas incluindo o novo botão CARTÃO SUS
            const sistemas = [
                { id: 'SIA_PAINEL', icon: '🖥️', label: 'Painel SIASUS', desc: 'Sistema Web Nativo', type: 'link', url: 'painel-siasus.html' },
                { id: 'BPA', icon: '📦', label: 'BPA', desc: 'Produção', type: 'ftp' },
                { id: 'RAAS', icon: '📋', label: 'RAAS', desc: 'Ações Amb.', type: 'ftp' },
                { id: 'FPO', icon: '💰', label: 'FPO', desc: 'Orçamentária', type: 'ftp' },
                { id: 'CNES', icon: '🏥', label: 'CNES', desc: 'Cadastro Nac.', type: 'ftp' },
                { id: 'SIHD_PAINEL', icon: '🏥', label: 'Painel SIHD', desc: 'Sistema Web Nativo', type: 'link', url: 'painel-sihd.html' },
                { id: 'CIHA', icon: '📁', label: 'CIHA', desc: 'Inst. Hosp.', type: 'ftp' },
                { id: 'SIOPS', icon: '📈', label: 'SIOPS', desc: 'Orçamentos', type: 'link', url: '/siops' },
                { 
                    id: 'CARTAO_SUS', 
                    icon: '🆔', 
                    label: 'CARTÃO SUS', 
                    desc: 'Acesso Oficial', 
                    type: 'externo', 
                    url: 'https://cadastro.saude.gov.br/segcartao/?contextType=external&username=string&contextValue=%2Foam&password=sercure_string&challenge_url=https%3A%2F%2Fcadastro.saude.gov.br%2Fsegcartao&request_id=8280444832271667541&authn_try_count=0&locale=pt_BR&resource_url=http%253A%252F%252Fcadastro.saude.gov.br%252Fnovocartao%252Frestrito%252FusuarioConsulta.jsp' 
                }
            ];
            
            // Renderização do Grid com lógica para links externos
            document.getElementById('grid-sistemas').innerHTML = sistemas.map((s, index) => {
                let acao = '';
                if (s.type === 'ftp') {
                    acao = `onclick="window.open('repositorio.html?sistema=${s.id}', '_blank')"`;
                } else if (s.type === 'link') {
                    acao = `onclick="window.location.href='${s.url}'"`;
                } else {
                    acao = `onclick="window.open('${s.url}', '_blank')"`;
                }

                // Stagger animation delay
                const delay = index * 0.08;

                return `
                    <div class="glass-card p-6 text-center cursor-pointer group flex flex-col items-center justify-center min-h-[160px]" style="animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; animation-delay: ${delay}s;" ${acao}>
                        <div class="text-4xl mb-4 group-hover:-translate-y-2 group-hover:scale-110 transition-all duration-300 drop-shadow-2xl">${s.icon}</div>
                        <h3 class="text-sm font-bold text-white tracking-wide">${s.label}</h3>
                        <p class="text-[9px] text-slate-400 mt-2 uppercase font-black tracking-[0.2em] bg-slate-900/50 px-2 py-1 rounded-md border border-white/5 group-hover:border-blue-500/30 transition-colors">${s.desc}</p>
                    </div>
                `;
            }).join('');

            if (emailUsuario) socket.emit('entrar_na_sala', emailUsuario);
            
            document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') enviarMensagem(); });
        });

        // --- LÓGICA DO CHAT ---
        socket.on('receber_mensagem', (data) => {
            const souEu = (data.usuario === nomeUsuario || data.nome === nomeUsuario);
            adicionarMensagemNaTela(data.usuario || data.nome, data.texto || data.mensagem, data.arquivo, data.tipo_arquivo || data.tipo, souEu);
            if (!souEu) {
                somNotificacao.play().catch(() => {});
                if (!document.getElementById('chat-window').classList.contains('active')) {
                    document.getElementById('chat-badge').classList.remove('hidden');
                }
            }
        });

        socket.on('historico_mensagens', (mensagens) => {
            const box = document.getElementById('chat-messages');
            box.innerHTML = ''; 
            mensagens.forEach(msg => {
                const souEu = (msg.usuario === nomeUsuario || msg.usuario === emailUsuario);
                adicionarMensagemNaTela(msg.usuario, msg.texto, msg.arquivo, msg.tipo, souEu);
            });
        });

        function enviarMensagem() {
            const input = document.getElementById('chat-input');
            const mensagem = input.value.trim();
            if (!mensagem || !emailUsuario) return;
            socket.emit('enviar_mensagem', { nome: nomeUsuario, mensagem: mensagem, salaId: emailUsuario });
            input.value = "";
        }

        function enviarArquivo() {
            const fileInput = document.getElementById('chat-file');
            const file = fileInput.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                socket.emit('enviar_mensagem', { nome: nomeUsuario, arquivo: e.target.result, tipo_arquivo: file.type, salaId: emailUsuario });
            };
            reader.readAsDataURL(file);
            fileInput.value = "";
        }

        function adicionarMensagemNaTela(autor, texto, arquivo, tipo, souEu) {
            const box = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `flex flex-col ${souEu ? 'items-end' : 'items-start'} mb-2`;
            
            let corpoHTML = texto ? `<p>${texto}</p>` : '';
            if (arquivo) {
                if (tipo && tipo.startsWith('image/')) {
                    corpoHTML += `<img src="${arquivo}" class="max-w-full rounded-lg mt-2 border border-white/10 cursor-pointer" onclick="window.open(this.src)">`;
                } else {
                    corpoHTML += `<a href="${arquivo}" download="anexo" class="block mt-2 text-[11px] bg-white/5 p-2 rounded border border-white/10 underline">Baixar Anexo</a>`;
                }
            }

            div.innerHTML = `
                <span class="text-[9px] mb-1 font-black ${souEu ? 'text-slate-500' : 'text-blue-500'} uppercase tracking-tighter">${autor}</span>
                <div class="${souEu ? 'msg-user' : 'msg-support'}">${corpoHTML}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }



        function toggleChat() { 
            const win = document.getElementById('chat-window');
            win.classList.toggle('active');
            if (win.classList.contains('active')) document.getElementById('chat-badge').classList.add('hidden');
        }

        function logout() { 
            localStorage.clear(); 
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
