<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Gateway DATASUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500 mb-2">Gateway DATASUS</h1>
            <p class="text-slate-400">Crie sua conta para acessar o sistema</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-slate-300 mb-1 ml-1 text-sm">Nome Completo</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" id="nome" placeholder="Digite seu nome" 
                        class="w-full bg-slate-700 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-slate-600">
                </div>
            </div>

            <div>
                <label class="block text-slate-300 mb-1 ml-1 text-sm">E-mail</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="email" placeholder="seu@email.com" 
                        class="w-full bg-slate-700 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-slate-600">
                </div>
            </div>

            <div>
                <label class="block text-slate-300 mb-1 ml-1 text-sm">Senha</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="senha" placeholder="••••••••" 
                        class="w-full bg-slate-700 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-slate-600">
                </div>
            </div>

            <button onclick="finalizarCadastro()" id="btn-cadastro"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all duration-300 shadow-lg shadow-blue-900/20 mt-4 flex justify-center items-center">
                <span>Criar Conta</span>
            </button>
        </div>

        <p class="text-center text-slate-400 mt-6 text-sm">
            Já tem uma conta? 
            <a href="index.html" class="text-blue-500 hover:underline">Faça login</a>
        </p>
    </div>

    <script>
        async function finalizarCadastro() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const btn = document.getElementById('btn-cadastro');

            // Validação
            if (!nome || !email || !senha) {
                return alert("⚠️ Preencha todos os campos obrigatórios.");
            }

            // UI: Feedback visual
            const textoOriginal = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Enviando e-mail...
            `;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha })
                });

                const data = await res.json();

                if (res.ok) {
                    alert("✅ Sucesso!\n" + data.message);
                    window.location.href = 'index.html'; 
                } else {
                    alert("❌ Erro: " + data.error);
                    resetarBotao(btn, textoOriginal);
                }
            } catch (err) {
                console.error("Erro:", err);
                alert("❌ Erro técnico ao conectar com o servidor.");
                resetarBotao(btn, textoOriginal);
            }
        }

        function resetarBotao(btn, texto) {
            btn.disabled = false;
            btn.innerHTML = texto;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    </script>

</body>
</html>
