<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Gateway DATASUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500 mb-2">Gateway DATASUS</h1>
            <p class="text-slate-400">Crie sua conta para acessar o sistema</p>
        </div>

        <form id="form-cadastro" class="space-y-4" onsubmit="finalizarCadastro(event)">
            <div>
                <label class="block text-slate-300 mb-1 ml-1 text-sm">Nome Completo</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" id="nome" placeholder="Digite seu nome" required oninput="validarFormulario()"
                        class="w-full bg-slate-700 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-slate-600 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-slate-300 mb-1 ml-1 text-sm">E-mail</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                    <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" oninput="validarFormulario()"
                        class="w-full bg-slate-700 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-slate-600 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-slate-300 mb-1 ml-1 text-sm">Senha</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="senha" placeholder="••••••••" oninput="validarFormulario()" required autocomplete="new-password"
                        class="w-full bg-slate-700 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-slate-600 transition-all">
                </div>
                
                <div class="w-full h-1.5 bg-slate-900 rounded-full mt-3 overflow-hidden">
                    <div id="barra-forca" class="w-0 h-full transition-all duration-300 bg-red-500"></div>
                </div>
                <div class="flex justify-between mt-1 px-1">
                    <span class="text-[10px] uppercase font-bold text-slate-500">Segurança:</span>
                    <span id="status-forca" class="text-[10px] uppercase font-bold text-slate-500">Insegura</span>
                </div>
            </div>

            <div>
                <label class="block text-slate-300 mb-1 ml-1 text-sm">Confirmar Senha</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                        <i class="fa-solid fa-check-double"></i>
                    </span>
                    <input type="password" id="confirmar_senha" placeholder="Repita a senha" oninput="validarFormulario()" required autocomplete="new-password"
                        class="w-full bg-slate-700 text-white rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-slate-600 transition-all">
                </div>
                <p id="erro-confirmacao" class="text-red-500 text-[10px] mt-1 ml-1 hidden">As senhas não coincidem ou são muito curtas.</p>
            </div>

            <button type="submit" id="btn-cadastro" disabled
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all duration-300 shadow-lg shadow-blue-900/20 mt-4 flex justify-center items-center opacity-50 cursor-not-allowed">
                <span id="btn-label">Criar Conta</span>
            </button>
        </form>

        <p class="text-center text-slate-400 mt-6 text-sm">
            Já tem uma conta? 
            <a href="index.html" class="text-blue-500 hover:underline font-medium">Faça login</a>
        </p>
    </div>

    <script>
        function validarFormulario() {
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const confirma = document.getElementById('confirmar_senha').value;
            
            const barra = document.getElementById('barra-forca');
            const status = document.getElementById('status-forca');
            const erroMsg = document.getElementById('erro-confirmacao');
            const btn = document.getElementById('btn-cadastro');
            
            let forca = 0;

            if (senha.length > 0) {
                if (senha.length >= 6) forca += 25;
                if (senha.match(/[a-z]/) && senha.match(/[A-Z]/)) forca += 25;
                if (senha.match(/[0-9]/)) forca += 25;
                if (senha.match(/[^a-zA-Z0-9]/)) forca += 25;
            }

            // Atualiza visual da barra
            barra.style.width = forca + "%";

            if (forca === 0) {
                barra.className = "h-full bg-slate-700 transition-all duration-300";
                status.innerText = "Insegura";
                status.className = "text-[10px] uppercase font-bold text-slate-500";
            } else if (forca <= 25) {
                barra.className = "h-full bg-red-500 transition-all duration-300";
                status.innerText = "Fraca";
                status.className = "text-[10px] uppercase font-bold text-red-500";
            } else if (forca <= 50) {
                barra.className = "h-full bg-yellow-500 transition-all duration-300";
                status.innerText = "Média";
                status.className = "text-[10px] uppercase font-bold text-yellow-500";
            } else if (forca <= 75) {
                barra.className = "h-full bg-blue-500 transition-all duration-300";
                status.innerText = "Forte";
                status.className = "text-[10px] uppercase font-bold text-blue-500";
            } else {
                barra.className = "h-full bg-emerald-500 transition-all duration-300";
                status.innerText = "Excelente";
                status.className = "text-[10px] uppercase font-bold text-emerald-500";
            }

            const senhasIguais = (senha === confirma && senha !== "");
            const forcaAceitavel = (forca >= 50);
            const camposPreenchidos = (nome !== "" && email.includes("@"));

            // Exibe erro de confirmação apenas se o usuário já começou a digitar no segundo campo
            if (confirma.length > 0 && !senhasIguais) {
                erroMsg.classList.remove('hidden');
            } else {
                erroMsg.classList.add('hidden');
            }

            // Habilita/Desabilita botão
            if (senhasIguais && forcaAceitavel && camposPreenchidos) {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.classList.add('hover:scale-[1.01]', 'active:scale-95');
            } else {
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.classList.remove('hover:scale-[1.01]', 'active:scale-95');
            }
        }

        async function finalizarCadastro(event) {
            event.preventDefault(); // Impede o reload da página

            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const btn = document.getElementById('btn-cadastro');

            const btnLabel = document.getElementById('btn-label');
            const conteudoOriginal = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 mr-3 text-white inline" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Cadastrando...
            `;

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha })
                });

                const data = await res.json();

                if (res.ok) {
                    alert("✅ Conta criada com sucesso!\nRedirecionando para o login...");
                    window.location.href = 'index.html'; 
                } else {
                    alert("❌ Erro: " + (data.error || "Erro ao cadastrar."));
                    resetarBotao(btn, conteudoOriginal);
                }
            } catch (err) {
                alert("❌ Servidor indisponível ou erro de rede.");
                resetarBotao(btn, conteudoOriginal);
            }
        }

        function resetarBotao(btn, conteudo) {
            btn.disabled = false;
            btn.innerHTML = conteudo;
            validarFormulario();
        }
    </script>
</body>
</html>
