<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Suporte | Gateway DATASUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .glass-header { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); }
    </style>
    <script>
        // ==========================================
        // TRAVA DE SEGURANÇA (SESSION STORAGE)
        // ==========================================
        if (sessionStorage.getItem('admin_autenticado') !== 'true') {
            window.location.href = 'admin-login.html';
        }
    </script>
</head>
<body class="min-h-screen flex flex-col">

    <header class="glass-header border-b border-white/10 p-4 shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='dashboard.html'" class="text-slate-400 hover:text-white transition-colors">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h1 class="text-xl font-black text-white italic leading-none">CONSOLE <span class="text-blue-500">SUPORTE</span></h1>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="hidden sm:flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-green-400">
                    <span class="relative flex h-2 w-2">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    Sistema Online
                </div>
                <button onclick="logoutAdmin()" class="text-slate-400 hover:text-red-500 text-xs font-bold uppercase tracking-widest transition-colors">
                    Sair <i class="fa-solid fa-right-from-bracket ml-1"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-5xl w-full mx-auto p-4 sm:p-6 flex flex-col overflow-hidden">
        <div class="bg-slate-900/50 border border-white/5 rounded-3xl flex-1 flex flex-col shadow-2xl relative overflow-hidden backdrop-blur-sm">
            
            <div id="admin-chat" class="flex-1 p-6 overflow-y-auto space-y-4 chat-container">
                <div class="text-center text-slate-500 text-sm italic py-10">
                    <i class="fa-solid fa-sync fa-spin mr-2"></i>Sincronizando com o servidor...
                </div>
            </div>

            <div class="p-4 bg-slate-800/40 border-t border-white/10 flex gap-3 items-center">
                <input type="text" id="admin-input" 
                       class="flex-1 bg-slate-950 border border-slate-700 p-4 rounded-2xl text-white focus:outline-none focus:border-blue-500 transition-all placeholder:text-slate-600 shadow-inner" 
                       placeholder="Digite sua resposta oficial...">
                
                <button onclick="enviarResposta()" class="bg-blue-600 hover:bg-blue-500 text-white w-14 h-14 sm:w-auto sm:px-8 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 shadow-lg shadow-blue-600/20 active:scale-95">
                    <span class="hidden sm:block">ENVIAR</span> <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        const socket = io();
        const nomeAdmin = "Suporte Arpoador"; 

        // Carregar histórico inicial
        socket.on('historico_mensagens', (mensagens) => {
            const container = document.getElementById('admin-chat');
            container.innerHTML = '';
            if (mensagens.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-600 py-10">Nenhuma mensagem registrada no banco de dados.</div>';
            } else {
                mensagens.forEach(msg => adicionarNaTela(msg.usuario, msg.texto));
            }
        });

        // Receber novas mensagens em tempo real
        socket.on('receber_mensagem', (data) => {
            // Remove mensagem de "vazio" se existir
            const container = document.getElementById('admin-chat');
            if (container.innerText.includes("Nenhuma mensagem")) container.innerHTML = '';

            adicionarNaTela(data.usuario, data.texto);
            
            // Tocar som apenas para mensagens recebidas (não enviadas pelo suporte)
            if(data.usuario !== nomeAdmin) {
                new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3').play().catch(e => {});
            }
        });

        function enviarResposta() {
            const input = document.getElementById('admin-input');
            const mensagem = input.value.trim();
            if (!mensagem) return;

            socket.emit('enviar_mensagem', {
                nome: nomeAdmin,
                mensagem: mensagem
            });
            input.value = "";
        }

        function adicionarNaTela(autor, texto) {
            const container = document.getElementById('admin-chat');
            const div = document.createElement('div');
            const isSuporte = (autor === nomeAdmin);

            div.className = `flex flex-col ${isSuporte ? 'items-end' : 'items-start'} mb-2`;
            div.innerHTML = `
                <span class="text-[9px] font-black mb-1 uppercase tracking-tighter ${isSuporte ? 'text-blue-400' : 'text-slate-500'}">
                    ${autor}
                </span>
                <div class="max-w-[85%] p-3 rounded-2xl text-sm ${isSuporte ? 'bg-blue-600 text-white rounded-tr-none shadow-md shadow-blue-900/20' : 'bg-slate-800 text-slate-200 rounded-tl-none border border-white/5 shadow-md'}">
                    ${texto}
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function logoutAdmin() {
            sessionStorage.removeItem('admin_autenticado');
            window.location.href = 'dashboard.html';
        }

        // Atalho teclado
        document.getElementById('admin-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviarResposta();
        });
    </script>
</body>
</html>
