<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Suporte | Gateway DATASUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="data:,">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; height: 100vh; overflow: hidden; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .glass-header { background: rgba(15, 23, 42, 0.9); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); }
        .user-item.active { background: rgba(59, 130, 246, 0.15); border-left: 4px solid #3b82f6; }
        
        .msg-bubble-admin {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 13.5px;
            line-height: 1.5;
            word-wrap: break-word;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .message-in { animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilos do Modal de Suporte */
        #modal-suporte input { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; transition: border 0.3s; }
        #modal-suporte input:focus { border-color: #3b82f6; }
    </style>
    <script>
        if (sessionStorage.getItem('admin_autenticado') !== 'true') {
            window.location.href = 'admin-login.html';
        }
    </script>
</head>
<body class="flex flex-col font-sans">

    <header class="glass-header border-b border-white/10 p-4 sticky top-0 z-50">
        <div class="max-w-full mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='dashboard.html'" title="Voltar ao Painel" class="bg-slate-800 hover:bg-slate-700 w-8 h-8 rounded-full flex items-center justify-center transition-all">
                    <i class="fa-solid fa-arrow-left text-xs"></i>
                </button>
                <h1 class="text-lg font-black text-white italic tracking-tighter uppercase">Console <span class="text-blue-500">Suporte</span></h1>
            </div>
            
            <div class="flex items-center gap-6">
                <button id="btn-add-suporte" onclick="abrirModalSuporte()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-[10px] font-black transition-all flex items-center gap-2 shadow-lg shadow-blue-600/20">
                    <i class="fa-solid fa-user-plus text-xs"></i> ADICIONAR ATENDENTE
                </button>
                <div class="h-6 w-[1px] bg-white/10 mx-1"></div>
                <div class="text-right">
                    <span id="status-conexao" class="text-[10px] text-red-500 font-bold uppercase block tracking-widest">● Desconectado</span>
                    <span id="nome-admin-header" class="text-[9px] text-slate-500 uppercase font-mono">Versão 2.0.4 - 2026</span>
                </div>
                <button onclick="logoutAdmin()" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2 rounded-lg text-[10px] font-black transition-all">
                    SAIR <i class="fa-solid fa-power-off ml-1"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-80 border-r border-white/10 bg-slate-900/40 flex flex-col">
            <div class="p-4 border-b border-white/5 bg-black/20">
                <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">Tickets em Aberto</h2>
            </div>
            <div id="lista-usuarios" class="flex-1 overflow-y-auto">
                <div id="empty-list" class="p-10 text-center text-xs text-slate-600 italic">
                    <i class="fa-solid fa-headset mb-3 text-2xl opacity-10 block"></i>
                    Aguardando solicitações...
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative bg-[#0b1120]">
            <div id="status-chat" class="p-4 bg-slate-900/60 border-b border-white/5 flex justify-between items-center min-h-[70px]">
                <div class="flex items-center gap-4">
                    <button id="btn-encerrar" onclick="encerrarAtendimento()" class="hidden bg-red-600 hover:bg-red-700 text-white p-2 px-4 rounded-full transition-all text-[10px] font-black flex items-center gap-2 shadow-lg shadow-red-600/20">
                        <i class="fa-solid fa-circle-xmark"></i> FINALIZAR
                    </button>
                    <span id="nome-atendimento" class="text-sm font-bold text-slate-400">Nenhum atendimento selecionado</span>
                </div>
                <div id="badge-online" class="hidden flex items-center gap-2 text-[10px] font-black text-green-500 bg-green-500/10 px-3 py-1.5 rounded-full border border-green-500/20">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    CONECTADO
                </div>
            </div>

            <div id="admin-chat" class="flex-1 p-6 overflow-y-auto space-y-4 chat-container flex flex-col">
                <div class="m-auto text-center text-slate-800">
                    <i class="fa-solid fa-terminal text-6xl mb-4 opacity-5 block"></i>
                    <p class="text-xs font-bold uppercase tracking-widest opacity-20">Selecione uma sessão lateral</p>
                </div>
            </div>

            <div class="p-4 bg-slate-900/80 border-t border-white/10 flex gap-3 items-center backdrop-blur-md">
                <input type="file" id="file-input" class="hidden" title="Selecionar arquivo" onchange="processarArquivo(this)">
                <button onclick="document.getElementById('file-input').click()" id="btn-file" disabled title="Anexar arquivo" class="text-slate-500 hover:text-blue-400 transition-colors p-2 disabled:opacity-20">
                    <i class="fa-solid fa-paperclip text-xl"></i>
                </button>

                <input type="text" id="admin-input" disabled
                       class="flex-1 bg-black/40 border border-white/5 p-4 rounded-2xl text-white focus:outline-none focus:border-blue-500 transition-all placeholder:text-slate-700 disabled:opacity-30 text-sm" 
                       placeholder="Digite sua mensagem técnica...">
                
                <button id="btn-enviar" onclick="enviarResposta()" disabled
                        class="bg-blue-600 hover:bg-blue-500 text-white px-8 h-[52px] rounded-2xl font-black text-xs transition-all flex items-center justify-center gap-2 shadow-xl shadow-blue-600/20 active:scale-95 disabled:opacity-30">
                    ENVIAR <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </main>
    </div>

    <!-- Modal para Gestão de Suporte -->
    <div id="modal-suporte" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="bg-[#0f172a] border border-white/10 w-full max-w-4xl rounded-3xl overflow-hidden shadow-2xl animate-in zoom-in duration-300">
            <div class="p-6 border-b border-white/5 bg-blue-600/5 flex justify-between items-center">
                <div>
                    <h3 class="text-lg font-black text-white italic tracking-tighter uppercase">Gestão de <span class="text-blue-500">Equipe de Suporte</span></h3>
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Controle de acessos e atendentes</p>
                </div>
                <button onclick="fecharModalSuporte()" title="Fechar" class="text-slate-500 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="flex flex-col md:flex-row divide-y md:divide-y-0 md:divide-x divide-white/5">
                <!-- Coluna: Adicionar Novo -->
                <div class="w-full md:w-1/2 p-8 space-y-6">
                    <h4 class="text-xs font-black text-blue-500 uppercase tracking-widest mb-4">Novo Cadastro</h4>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Nome do Atendente</label>
                        <input type="text" id="sup-nome" placeholder="Ex: João Silva">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Email de Acesso</label>
                        <input type="email" id="sup-email" placeholder="email@arpoador.com">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Senha Temporária</label>
                        <input type="password" id="sup-senha" placeholder="••••••••">
                    </div>
                    
                    <button id="btn-criar-sup" onclick="criarContaSuporte()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all shadow-xl shadow-blue-600/20 active:scale-[0.98] mt-4 uppercase text-xs tracking-widest">
                        Cadastrar Atendente
                    </button>
                </div>

                <!-- Coluna: Lista Atual -->
                <div class="w-full md:w-1/2 p-8 bg-black/20 overflow-hidden flex flex-col">
                    <h4 class="text-xs font-black text-emerald-500 uppercase tracking-widest mb-4">Equipe Atual</h4>
                    <div id="lista-atendentes" class="flex-1 overflow-y-auto space-y-3 pr-2 min-h-[300px]">
                        <p class="text-[10px] text-slate-600 italic text-center py-10">Carregando equipe...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Função para Gerar Som Sintético (Evita Erros 404 e Dependências Externas)
        function tocarAlerta() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Nota La (A5)
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.01);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.5);
            } catch (e) { console.warn("Erro ao gerar som:", e); }
        }

        // Funções para Gestão de Suporte
        function abrirModalSuporte() { 
            document.getElementById('modal-suporte').classList.remove('hidden'); 
            carregarAtendentes();
        }
        function fecharModalSuporte() { document.getElementById('modal-suporte').classList.add('hidden'); }
        
        function verificarListaVazia() {
            const lista = document.getElementById('lista-usuarios');
            const cards = Array.from(lista.children).filter(el => el.id !== 'empty-list');
            const visiveis = cards.filter(el => !el.classList.contains('hidden'));
            
            if (visiveis.length === 0) {
                if (!document.getElementById('empty-list')) {
                    const div = document.createElement('div');
                    div.id = 'empty-list';
                    div.className = "p-10 text-center text-xs text-slate-600 italic";
                    div.innerHTML = `
                        <i class="fa-solid fa-headset mb-3 text-2xl opacity-10 block"></i>
                        Aguardando solicitações...
                    `;
                    lista.appendChild(div);
                }
            } else {
                const empty = document.getElementById('empty-list');
                if (empty) empty.remove();
            }
        }

        function limparChatCentral() {
            salaAtual = null;
            document.getElementById('admin-chat').innerHTML = `
                <div class="m-auto text-center text-slate-800">
                    <i class="fa-solid fa-terminal text-6xl mb-4 opacity-5 block"></i>
                    <p class="text-xs font-bold uppercase tracking-widest opacity-20">Selecione uma sessão lateral</p>
                </div>
            `;
            document.getElementById('nome-atendimento').innerText = "Nenhum atendimento selecionado";
            document.getElementById('nome-atendimento').classList.replace('text-white', 'text-slate-400');
            document.getElementById('btn-encerrar').classList.add('hidden');
            document.getElementById('badge-online').classList.add('hidden');
            document.getElementById('admin-input').value = "";
            document.getElementById('admin-input').disabled = true;
            document.getElementById('btn-enviar').disabled = true;
            document.getElementById('btn-file').disabled = true;
        }

        async function criarContaSuporte() {
            const nome = document.getElementById('sup-nome').value;
            const email = document.getElementById('sup-email').value;
            const senha = document.getElementById('sup-senha').value;
            const btn = document.getElementById('btn-criar-sup');
            if (!nome || !email || !senha) return alert("Preencha todos os campos");
            
            btn.disabled = true; 
            btn.innerText = "Processando...";

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000); // 15 segundos

            try {
                const res = await fetch('/api/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha, role: 'support' }),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                const data = await res.json();
                
                if (res.ok) {
                    alert(data.message || "Atendente cadastrado com sucesso!");
                    document.getElementById('sup-nome').value = '';
                    document.getElementById('sup-email').value = '';
                    document.getElementById('sup-senha').value = '';
                    carregarAtendentes(); // Recarrega a lista
                } else { 
                    alert(data.error || "Erro ao cadastrar atendente."); 
                }
            } catch (err) { 
                if (err.name === 'AbortError') {
                    alert("O servidor está demorando muito para responder. Tente novamente em instantes.");
                } else {
                    alert("Erro ao conectar com servidor: " + err.message); 
                }
            } finally { 
                clearTimeout(timeoutId);
                btn.disabled = false; 
                btn.innerText = "Cadastrar Atendente"; 
            }
        }

        async function carregarAtendentes() {
            const container = document.getElementById('lista-atendentes');
            try {
                const res = await fetch('/api/admin/atendentes');
                const atendentes = await res.json();
                
                // Garantir que atendentes seja um array antes de processar
                if (!Array.isArray(atendentes) || atendentes.length === 0) {
                    container.innerHTML = '<p class="text-[10px] text-slate-700 italic text-center py-10">Nenhum atendente cadastrado.</p>';
                    return;
                }

                container.innerHTML = atendentes.map(at => `
                    <div class="bg-white/5 p-4 rounded-xl border border-white/5 flex justify-between items-center group hover:bg-white/10 transition-all">
                        <div class="flex flex-col overflow-hidden">
                            <span class="text-xs font-bold text-white truncate">${at.nome}</span>
                            <span class="text-[9px] text-slate-500 font-mono truncate uppercase">${at.email}</span>
                        </div>
                        <button onclick="excluirAtendente('${at.email}')" class="text-slate-600 hover:text-red-500 p-2 transition-colors">
                            <i class="fa-solid fa-trash-can text-sm"></i>
                        </button>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Erro ao carregar atendentes:", err);
                container.innerHTML = `<p class="text-[10px] text-red-500 text-center py-10">Erro ao carregar lista. ${err.message || ''}</p>`;
            }
        }

        async function excluirAtendente(email) {
            if (!confirm(`Deseja realmente remover o acesso de ${email}?`)) return;

            try {
                const res = await fetch('/api/admin/deletar-atendente', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                if (res.ok) {
                    alert("Atendente removido com sucesso!");
                    carregarAtendentes();
                } else {
                    const data = await res.json();
                    alert(data.error || "Erro ao excluir.");
                }
            } catch (err) {
                alert("Erro ao conectar com servidor.");
            }
        }

        const socket = io();
        const nomeAdmin = sessionStorage.getItem('admin_nome') || "Suporte Arpoador"; 
        
        // Controle de Permissões e Identidade
        const adminRole = sessionStorage.getItem('admin_role');
        if (adminRole !== 'master') {
            const btnAdd = document.getElementById('btn-add-suporte');
            if (btnAdd) btnAdd.style.display = 'none';
        }
        document.getElementById('nome-admin-header').innerText = nomeAdmin.toUpperCase();

        let salaAtual = null;
        let usuariosConhecidos = new Set();

        const formatarId = (id) => id.replace(/[^a-zA-Z0-9]/g, '_');

        socket.on('connect', () => {
            document.getElementById('status-conexao').innerText = "● Painel Online";
            document.getElementById('status-conexao').className = "text-[10px] text-green-500 font-bold uppercase block tracking-widest";
            socket.emit('admin_entrar', { nome: nomeAdmin });
        });
        
        let ticketsOcupados = {};

        socket.on('lista_usuarios_ocupados', (data) => {
            ticketsOcupados = data;
            Object.keys(data).forEach(salaId => {
                atualizarVisualOcupado(salaId, data[salaId]);
            });
        });

        socket.on('fila_ativa', (data) => {
            if (data && data.length > 0) {
                // Reconstrói a lista ignorando duplicatas já inseridas
                data.forEach(user => {
                    adicionarUsuarioLista(user.nome, user.salaId);
                });
            }
        });

        socket.on('usuario_ocupado', (data) => {
            ticketsOcupados[data.salaId] = data.nomeAtendente;
            atualizarVisualOcupado(data.salaId, data.nomeAtendente);
        });

        socket.on('usuario_livre', (data) => {
            delete ticketsOcupados[data.salaId];
            atualizarVisualOcupado(data.salaId, null);
        });

        socket.on('remover_usuario_lista', (data) => {
            const idClean = formatarId(data.salaId);
            const el = document.getElementById(`user-${idClean}`);
            if (el) el.remove();
            
            // --- CORREÇÃO: Limpa do registro para permitir reentrada se o usuário pedir ajuda novamente ---
            usuariosConhecidos.delete(data.salaId);
            
            // Se o atendente estava com esse ticket selecionado, limpa visualmente sem dar F5
            if (salaAtual === data.salaId) {
                limparChatCentral();
            }
            verificarListaVazia();
        });

        socket.on('erro_chat', (data) => {
            alert(data.mensagem);
        });

        socket.on('disconnect', () => {
            document.getElementById('status-conexao').innerText = "● Desconectado";
            document.getElementById('status-conexao').className = "text-[10px] text-red-500 font-bold uppercase block tracking-widest";
        });

        socket.on('receber_mensagem', (data) => {
            const salaId = data.salaId;
            const nomeUsuario = data.nome || data.usuario;

            if (nomeUsuario !== "IA Inteligente" && nomeUsuario !== nomeAdmin) {
                adicionarUsuarioLista(nomeUsuario, salaId);
                
                // --- SINCRONIZAÇÃO AUTOMÁTICA: Mover para o Topo ---
                const idClean = formatarId(salaId);
                const el = document.getElementById(`user-${idClean}`);
                if (el) {
                    const lista = document.getElementById('lista-usuarios');
                    lista.prepend(el); // Move para o topo da lista física
                    
                    // Se o ticket estiver livre (ninguém atendendo), garante que reapareça
                    if (!ticketsOcupados[salaId]) {
                        el.classList.remove('hidden');
                        el.classList.remove('opacity-50');
                    }
                }
                
                // --- ALERTA SONORO: Campainha para Pendentes ---
                // Só apita se não for o atendimento atual e se estiver livre (sem suporte)
                if (!ticketsOcupados[salaId] && salaId !== salaAtual) {
                    tocarAlerta();
                }
            }

            if (salaId === salaAtual) {
                adicionarNaTela(nomeUsuario, data.mensagem || data.texto, data.arquivo, data.tipo_arquivo || data.tipo);
            } else if (nomeUsuario !== nomeAdmin) {
                marcarComoNaoLida(salaId);
            }
        });

        socket.on('historico_mensagens', (mensagens) => {
            const container = document.getElementById('admin-chat');
            container.innerHTML = '';
            
            if(!mensagens || mensagens.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-700 text-[10px] font-bold uppercase py-10 opacity-30">Início da transmissão</div>';
            } else {
                mensagens.forEach(msg => {
                    adicionarNaTela(msg.usuario || msg.nome, msg.texto || msg.mensagem, msg.arquivo, msg.tipo || msg.tipo_arquivo);
                });
            }
        });

        function selecionarUsuario(nome, salaId) {
            if (salaAtual === salaId) return;
            
            // Verificação de Trava
            if (ticketsOcupados[salaId] && ticketsOcupados[salaId].toUpperCase() !== nomeAdmin.toUpperCase()) {
                alert(`⚠️ Atenção: ${nome} já está sendo atendido por ${ticketsOcupados[salaId]}.`);
                return;
            }

            salaAtual = salaId;
            const container = document.getElementById('admin-chat');
            container.innerHTML = '<div class="m-auto flex items-center gap-2 text-slate-500"><i class="fa-solid fa-spinner fa-spin"></i> Sincronizando dados...</div>';
            
            document.getElementById('nome-atendimento').innerText = nome;
            document.getElementById('nome-atendimento').classList.replace('text-slate-400', 'text-white');
            document.getElementById('btn-encerrar').classList.remove('hidden');
            document.getElementById('badge-online').classList.remove('hidden');
            
            document.getElementById('admin-input').disabled = false;
            document.getElementById('btn-enviar').disabled = false;
            document.getElementById('btn-file').disabled = false;
            document.getElementById('admin-input').focus();

            socket.emit('entrar_na_sala', salaId);

            const idClean = formatarId(salaId);
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
            const card = document.getElementById(`user-${idClean}`);
            if(card) card.classList.add('active');
            
            const badge = document.getElementById(`badge-${idClean}`);
            if(badge) badge.classList.add('hidden');
        }

        function adicionarUsuarioLista(nome, salaId) {
            if (usuariosConhecidos.has(salaId)) return;

            usuariosConhecidos.add(salaId);
            const lista = document.getElementById('lista-usuarios');
            const empty = document.getElementById('empty-list');
            if (empty) empty.remove();

            const idClean = formatarId(salaId);
            const div = document.createElement('div');
            div.id = `user-${idClean}`;
            div.className = "user-item p-4 border-b border-white/5 cursor-pointer hover:bg-white/5 transition-all flex justify-between items-center group";
            div.onclick = () => selecionarUsuario(nome, salaId);
            div.innerHTML = `
                <div class="flex flex-col overflow-hidden">
                    <span class="text-sm font-bold text-white group-hover:text-blue-400 transition-colors truncate">${nome}</span>
                    <span id="status-${idClean}" class="text-[9px] text-slate-500 font-mono truncate uppercase">${salaId.substring(0, 15)}...</span>
                </div>
                <div class="flex items-center gap-2">
                    <span id="badge-ocupado-${idClean}" class="hidden text-[8px] bg-red-500/20 text-red-500 px-2 py-0.5 rounded font-black tracking-tighter">OCUPADO</span>
                    <span id="badge-${idClean}" class="hidden w-2 h-2 bg-blue-500 rounded-full animate-pulse shadow-lg shadow-blue-500/50"></span>
                </div>
            `;
            lista.prepend(div);
            verificarListaVazia();

            // Se já estiver ocupado ao adicionar (ex: reconexão)
            if (ticketsOcupados[salaId]) {
                atualizarVisualOcupado(salaId, ticketsOcupados[salaId]);
            }
        }

        function atualizarVisualOcupado(salaId, nomeAtendente) {
            const idClean = formatarId(salaId);
            const card = document.getElementById(`user-${idClean}`);
            const statusText = document.getElementById(`status-${idClean}`);
            const badgeOcupado = document.getElementById(`badge-ocupado-${idClean}`);

            if (!card) return;

            if (nomeAtendente) {
                // Se o atendente for OUTRO administrador, esconde o card para evitar confusão
                if (nomeAtendente.toUpperCase() !== nomeAdmin.toUpperCase()) {
                    card.classList.add('hidden');
                } else {
                    card.classList.remove('hidden');
                    card.classList.add('opacity-50');
                }
                
                if (statusText) {
                    statusText.innerText = `EM ATENDIMENTO: ${nomeAtendente.toUpperCase()}`;
                    statusText.classList.replace('text-slate-500', 'text-red-400');
                }
                if (badgeOcupado) badgeOcupado.classList.remove('hidden');
            } else {
                card.classList.remove('hidden');
                card.classList.remove('opacity-50');
                if (statusText) {
                    statusText.innerText = salaId.substring(0, 15) + "...";
                    statusText.classList.replace('text-red-400', 'text-slate-500');
                }
                if (badgeOcupado) badgeOcupado.classList.add('hidden');
            }
            verificarListaVazia();
        }

        function adicionarNaTela(autor, texto, arquivo, tipo) {
            const container = document.getElementById('admin-chat');
            const isSuporte = (autor === nomeAdmin);
            const div = document.createElement('div');
            div.className = `flex flex-col ${isSuporte ? 'items-end' : 'items-start'} mb-4 w-full message-in`;

            let corpoHTML = texto ? `<p>${texto}</p>` : '';

            if (arquivo) {
                if (tipo && tipo.startsWith('image/')) {
                    corpoHTML += `<img src="${arquivo}" class="max-w-xs rounded-xl border border-white/10 mt-2 shadow-2xl cursor-pointer" onclick="window.open(this.src)">`;
                } else {
                    corpoHTML += `
                        <a href="${arquivo}" download class="flex items-center gap-3 bg-black/40 p-4 rounded-2xl border border-white/10 hover:border-blue-500/50 mt-2 transition-all group">
                            <i class="fa-solid fa-file-pdf text-red-500 text-2xl group-hover:scale-110 transition-transform"></i>
                            <div class="text-left">
                                <span class="text-[10px] block text-slate-500 uppercase font-bold">Documento Anexo</span>
                                <span class="text-[11px] text-blue-400 font-black">BAIXAR</span>
                            </div>
                        </a>`;
                }
            }

            div.innerHTML = `
                <span class="text-[9px] font-black mb-1.5 uppercase tracking-widest ${isSuporte ? 'text-blue-500' : 'text-emerald-500'}">
                    ${isSuporte ? 'SISTEMA GATEWAY' : autor}
                </span>
                <div class="msg-bubble-admin ${isSuporte ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-800 text-slate-200 rounded-tl-none border border-white/5'}">
                    ${corpoHTML}
                </div>`;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function enviarResposta() {
            const input = document.getElementById('admin-input');
            const mensagem = input.value.trim();
            if (!mensagem || !salaAtual) return;

            socket.emit('enviar_mensagem', {
                nome: nomeAdmin,
                mensagem: mensagem,
                salaId: salaAtual
            });
            input.value = "";
        }

        function processarArquivo(input) {
            const file = input.files[0];
            if (!file || !salaAtual) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                socket.emit('enviar_mensagem', { // Unificado com enviar_mensagem para consistência
                    nome: nomeAdmin,
                    arquivo: e.target.result,
                    tipo_arquivo: file.type,
                    mensagem: `📎 Arquivo enviado: ${file.name}`,
                    salaId: salaAtual
                });
            };
            reader.readAsDataURL(file);
            input.value = "";
        }

        function encerrarAtendimento() {
            if (confirm("Confirmar encerramento? O histórico será removido.")) {
                const salaParaEncerrar = salaAtual;
                limparChatCentral();
                socket.emit('encerrar_chamado', salaParaEncerrar);
            }
        }

        function marcarComoNaoLida(salaId) {
            const idClean = formatarId(salaId);
            const badge = document.getElementById(`badge-${idClean}`);
            if (badge) badge.classList.remove('hidden');
        }

        function logoutAdmin() {
            const role = sessionStorage.getItem('admin_role');
            sessionStorage.clear();
            window.location.href = (role === 'support') ? 'login-suporte.html' : 'admin-login.html';
        }

        document.getElementById('admin-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviarResposta();
        });
    </script>
</body>
</html>
